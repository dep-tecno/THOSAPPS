<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SECURITY: Content Security Policy — limita fonts de scripts/estils externs -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://cdn.tailwindcss.com https://html2canvas.hertzen.com; style-src 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob:; font-src https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'none'">
    <title>THOSMap v2.0</title>
    <!-- SECURITY: cdn.tailwindcss.com és un CDN dinàmic (Play CDN) i no admet SRI estàtic -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
    <!-- FontAwesome per icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS" crossorigin="anonymous">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111827; /* Fons fosc (Gray 900) */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
            color: #f3f4f6;
        }

        #workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            /* Fons aplicat directament amb CSS inicial */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0;
            transform-origin: 0 0; 
        }

        #workspace.grabbing { cursor: grabbing; }

        #connections-layer, #nodes-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            transform-origin: 0 0; 
            overflow: visible;
        }

        .node { pointer-events: auto; }

        .connection-line {
            fill: none;
            stroke: #9ca3af;
            stroke-width: 2px;
            stroke-linecap: square; 
            stroke-linejoin: round;
            transition: d 0.1s ease;
        }

        .arrow-line {
            fill: none;
            stroke: #f87171;
            stroke-width: 2px;
            stroke-dasharray: 5, 5;
            marker-end: url(#arrowhead);
        }

        /* --- ESTILS NODE --- */
        .node {
            position: absolute;
            background: #1f2937;
            border-radius: 6px;
            padding: 8px 12px;
            min-width: 80px;
            max-width: 250px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            border: 1px solid #4b5563;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px; 
            box-sizing: border-box; 
            transform: translate(-50%, -50%); 
            color: #f9fafb;
        }

        .node.root-node {
            background-color: #2563eb; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
        }

        .node:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-color: #6b7280;
        }

        .node.selected {
            border: 3px solid #e879f9; 
            box-shadow: 0 0 15px rgba(232, 121, 249, 0.5); 
            z-index: 50; 
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* --- MODE ESQUEMA (OUTLINE) --- */
        .mode-outline .node {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 2px 0px !important;
            min-width: auto !important;
            text-align: left;
            justify-content: flex-start;
            transform: translate(0, -50%) !important; 
            color: #e5e7eb !important; 
            cursor: move; 
        }
        
        #workspace.mode-outline {
            background-color: #111827 !important; 
        }

        .mode-outline .connection-line {
            stroke: #9ca3af !important; 
        }

        .mode-outline .node.root-node {
            font-size: inherit !important; 
            font-weight: 700 !important; 
            border: none !important;
            margin: 0 !important;
            color: #e5e7eb !important; 
            background: transparent !important;
            padding: 2px 5px !important;
        }

        .mode-outline .node.selected {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 1px dashed #666 !important;
            border-radius: 4px;
            transform: translate(0, -50%) !important; 
        }

        .mode-outline .node:hover {
            text-decoration: underline;
            box-shadow: none !important;
        }

        .mode-outline .node-content { color: #e5e7eb !important; }

        /* --- ELEMENTS ADICIONALS --- */
        .node.linking-source {
            border: 3px dashed #f87171 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        .resize-handle {
            position: absolute; bottom: 0; right: 0; width: 15px; height: 15px;
            cursor: nwse-resize; 
            background: linear-gradient(135deg, transparent 50%, #9ca3af 50%);
            border-bottom-right-radius: 4px; display: none; z-index: 60;
        }
        .node.selected .resize-handle { display: block; }

        .node-content {
            outline: none; cursor: text; width: 100%; pointer-events: none; 
            word-wrap: break-word; line-height: 1.4;
            user-select: text; -webkit-user-select: text;
            white-space: pre-wrap; 
        }
        .node.selected .node-content { pointer-events: auto; }

        .node-img { width: 100%; height: auto; margin-bottom: 5px; display: block; pointer-events: none; }

        /* BARRA D'EINES */
        #toolbar {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 56px;
            background: #1f2937; border-bottom: 1px solid #374151;
            display: flex; align-items: center; padding: 0 15px; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        #toolbar::-webkit-scrollbar { display: none; }

        .tool-btn {
            display: flex; align-items: center; gap: 6px; background: transparent;
            border: none; 
            padding: 6px 10px; 
            margin-right: 5px; border-radius: 4px;
            cursor: pointer; color: #d1d5db; 
            font-size: 13px; 
            font-weight: 500;
            transition: background 0.1s;
            white-space: nowrap; 
        }

        .tool-btn i { font-size: 16px; }

        .tool-btn:hover { background: #374151; color: #fff; }
        .tool-btn.active { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        
        .tool-separator { 
            width: 1px; height: 24px; background: #4b5563; margin: 0 10px; flex-shrink: 0; 
        }

        .floating-menu {
            position: absolute; background: #1f2937; border: 1px solid #4b5563;
            padding: 5px 0; border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); display: none; z-index: 200;
        }
        .color-picker-swatch {
            width: 20px; height: 20px; border-radius: 3px; border: 1px solid #4b5563;
            cursor: pointer; display: inline-block; margin: 2px;
        }
        #color-menu { width: 160px; padding: 8px; }
        #layout-menu { width: 180px; }
        
        .menu-item {
            padding: 8px 15px; cursor: pointer; font-size: 14px; color: #d1d5db;
            display: flex; align-items: center; gap: 8px;
        }
        .menu-item:hover { background-color: #374151; color: white; }

        #toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #4b5563; color: white; padding: 12px 24px;
            border-radius: 6px; font-size: 15px; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        input[type="file"] { display: none; }
        #app-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="flex items-center mr-6">
            <span id="app-title" class="mr-4">
                <i class="fas fa-project-diagram mr-1" style="color:#60a5fa"></i><span style="color:#60a5fa">THOS</span><span class="text-white">MAP</span><span class="text-gray-400 text-sm font-normal ml-1">v2.0</span>
            </span>
        </div>
        <div class="tool-separator"></div>
        <button onclick="app.addChild()" class="tool-btn" title="Afegir Fill (TAB)"><i class="fas fa-sitemap"></i> Fill</button>
        <button onclick="app.addSibling()" class="tool-btn" title="Afegir Germà (ENTER)"><i class="fas fa-plus"></i> Germà</button>
        <button onclick="app.addRootNode()" class="tool-btn font-bold text-blue-400"><i class="fas fa-star"></i> Pare</button>
        <button onclick="app.deleteNode()" class="tool-btn text-red-400"><i class="fas fa-trash-alt"></i></button>
        <div class="tool-separator"></div>
        
        <button onclick="app.zoomOut()" class="tool-btn" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
        <button onclick="app.zoomIn()" class="tool-btn" title="Zoom In"><i class="fas fa-search-plus"></i></button>
        
        <div class="tool-separator"></div>
        <button onclick="app.toggleConnectMode()" id="btn-connect" class="tool-btn"><i class="fas fa-long-arrow-alt-right"></i> Enllaç</button>
        <button onclick="app.toggleColorMenu(event)" class="tool-btn"><i class="fas fa-palette"></i></button>
        <button onclick="document.getElementById('imgInput').click()" class="tool-btn"><i class="fas fa-image"></i></button>
        
        <div class="tool-separator"></div>
        <button onclick="app.adjustFontSize(2)" class="tool-btn"><i class="fas fa-font"></i>+</button>
        <button onclick="app.adjustFontSize(-2)" class="tool-btn"><i class="fas fa-font"></i>-</button>
        
        <div class="tool-separator"></div>
        <button onclick="app.toggleLayoutMenu(event)" class="tool-btn"><i class="fas fa-layer-group"></i> Tipologia</button>
        <button onclick="app.autoArrange()" class="tool-btn text-green-400" title="Ordenar nodes proporcionalment"><i class="fas fa-magic"></i> Ordenar</button>

        <div class="tool-separator"></div>
        
        <button onclick="app.exportPNG()" class="tool-btn text-blue-400 hover:bg-gray-700"><i class="fas fa-image"></i> PNG</button>
        <button onclick="app.saveToJSON()" class="tool-btn"><i class="fas fa-save"></i></button>
        <button onclick="document.getElementById('fileInput').click()" class="tool-btn"><i class="fas fa-folder-open"></i></button>
    </div>

    <div id="color-menu" class="floating-menu">
        <div class="color-picker-swatch" style="background:#e5e7eb; border:1px solid #4b5563" onclick="app.setNodeColor('#e5e7eb')"></div>
        <div class="color-picker-swatch" style="background:#374151; border:1px solid #9ca3af" onclick="app.setNodeColor('#374151')"></div>
        <div class="color-picker-swatch" style="background:#ef4444" onclick="app.setNodeColor('#ef4444')"></div>
        <div class="color-picker-swatch" style="background:#eab308" onclick="app.setNodeColor('#eab308')"></div>
        <div class="color-picker-swatch" style="background:#22c55e" onclick="app.setNodeColor('#22c55e')"></div>
        <div class="color-picker-swatch" style="background:#3b82f6" onclick="app.setNodeColor('#3b82f6')"></div>
        <div class="color-picker-swatch" style="background:#a855f7" onclick="app.setNodeColor('#a855f7')"></div>
    </div>

    <div id="layout-menu" class="floating-menu">
        <div class="menu-item" onclick="app.applyLayout('mindmap')"><i class="fas fa-sitemap w-5"></i> Mapa Mental</div>
        <div class="menu-item" onclick="app.applyLayout('outline')"><i class="fas fa-list-ul w-5"></i> Esquema</div>
        <div class="menu-item" onclick="app.applyLayout('hierarchy')"><i class="fas fa-network-wired w-5"></i> Jerarquia</div>
    </div>

    <input type="file" id="fileInput" onchange="app.loadFromJSON(this)" accept=".json">
    <input type="file" id="imgInput" onchange="app.attachImage(this)" accept="image/*">
    <div id="toast">Missatge sistema</div>

    <div id="workspace">
        <svg id="connections-layer">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#f87171" />
                </marker>
                
                <marker id="arrowhead-selected" markerWidth="12" markerHeight="4" refX="11" refY="2" orient="auto">
                  <polygon points="0 0, 12 2, 0 4" fill="#3b82f6" />
                </marker>
            </defs>
            <g id="connections-group"></g>
        </svg>
        <div id="nodes-layer"></div>
    </div>

    <script>
        class MindMapApp {
            constructor() {
                this.nodes = [];
                this.extraConnections = [];
                this.selectedNodeId = null;
                this.selectedConnectionId = null; 
                this.draggedNodeId = null;
                this.currentLayout = 'mindmap'; 
                
                this.isConnecting = false;
                this.connectionSourceId = null;
                
                this.panX = window.innerWidth / 2;
                this.panY = window.innerHeight / 2;
                this.zoomLevel = 1; 
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                this.isDraggingWorkspace = false;
                this.isResizing = false;
                this.resizingNodeId = null;
                this.resizeStartX = 0;
                this.resizeStartWidth = 0;
                this.dragMoved = false;

                this.workspace = document.getElementById('workspace');
                this.nodesLayer = document.getElementById('nodes-layer');
                this.svgGroup = document.getElementById('connections-group');
                this.colorMenu = document.getElementById('color-menu');
                this.layoutMenu = document.getElementById('layout-menu');

                this.bindMethods();
            }

            bindMethods() {
                this.addChild = this.addChild.bind(this);
                this.addSibling = this.addSibling.bind(this);
                this.addRootNode = this.addRootNode.bind(this);
                this.deleteNode = this.deleteNode.bind(this);
                this.toggleColorMenu = this.toggleColorMenu.bind(this);
                this.toggleLayoutMenu = this.toggleLayoutMenu.bind(this);
                this.toggleConnectMode = this.toggleConnectMode.bind(this);
                this.setNodeColor = this.setNodeColor.bind(this);
                this.saveToJSON = this.saveToJSON.bind(this);
                this.exportPNG = this.exportPNG.bind(this);
                this.exportHTML = this.exportHTML.bind(this);
                this.applyLayout = this.applyLayout.bind(this);
                this.loadFromJSON = this.loadFromJSON.bind(this);
                this.attachImage = this.attachImage.bind(this);
                this.adjustFontSize = this.adjustFontSize.bind(this);
                this.zoomIn = this.zoomIn.bind(this);
                this.zoomOut = this.zoomOut.bind(this);
                this.handleMouseDown = this.handleMouseDown.bind(this);
                this.handleMouseMove = this.handleMouseMove.bind(this);
                this.handleMouseUp = this.handleMouseUp.bind(this);
                this.handleKeyDown = this.handleKeyDown.bind(this);
                this.handleNodeMouseDown = this.handleNodeMouseDown.bind(this);
                this.handleResizeMouseDown = this.handleResizeMouseDown.bind(this);
                this.selectNode = this.selectNode.bind(this);
                this.addExtraConnection = this.addExtraConnection.bind(this);
                this.render = this.render.bind(this);
            }

            // SECURITY: escapa caràcters HTML perillosos per evitar XSS via innerHTML
            escapeHTML(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // SECURITY: valida que un color sigui un valor CSS segur (hex o rgb)
            sanitizeColor(color, fallback = '#374151') {
                const valid = /^#[0-9a-fA-F]{3,8}$|^rgb\(\s*\d+\s*,\s*\d+\s*,\s*\d+\s*\)$/.test(String(color));
                return valid ? color : fallback;
            }

            init() {
                this.addRootNode();
                window.addEventListener('keydown', this.handleKeyDown);
                window.addEventListener('mousemove', this.handleMouseMove);
                window.addEventListener('mouseup', this.handleMouseUp);
                this.workspace.addEventListener('mousedown', this.handleMouseDown);
                this.workspace.addEventListener('wheel', (e) => {
                    if (e.ctrlKey) {
                        e.preventDefault();
                        if (e.deltaY < 0) this.zoomIn(); else this.zoomOut();
                    } else {
                        e.preventDefault();
                        if (e.deltaY < 0) this.zoomIn(); else this.zoomOut();
                    }
                }, { passive: false });

                window.addEventListener('click', (e) => {
                    if (!e.target.closest('#color-menu') && !e.target.closest('[onclick*="toggleColorMenu"]')) {
                        this.colorMenu.style.display = 'none';
                    }
                    if (!e.target.closest('#layout-menu') && !e.target.closest('[onclick*="toggleLayoutMenu"]')) {
                        this.layoutMenu.style.display = 'none';
                    }
                });
                this.render();
            }

            zoomIn() {
                if (this.zoomLevel < 3) {
                    this.zoomLevel += 0.1;
                    this.updateTransform();
                }
            }

            zoomOut() {
                if (this.zoomLevel > 0.2) {
                    this.zoomLevel -= 0.1;
                    this.updateTransform();
                }
            }

            updateTransform() {
                const transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoomLevel})`;
                this.nodesLayer.style.transform = transform;
                this.svgGroup.setAttribute('transform', `translate(${this.panX} ${this.panY}) scale(${this.zoomLevel})`);
                
                this.workspace.style.backgroundPosition = `${this.panX}px ${this.panY}px`;
                this.workspace.style.backgroundSize = `${20 * this.zoomLevel}px ${20 * this.zoomLevel}px`;
            }

            // --- GESTIÓ NODES ---

            addRootNode() {
                const x = (window.innerWidth / 2 - this.panX) / this.zoomLevel;
                const y = (window.innerHeight / 2 - this.panY) / this.zoomLevel;
                this.addNode(null, "Pare", true, x, y);
                this.showToast("Pare afegit");
            }

            addNode(parentId, text = "Nova Idea", isRoot = false, customX = null, customY = null) {
                const id = 'node_' + Date.now() + Math.random().toString(36).substr(2, 5);
                let x = 0, y = 0, color = "#FFFFFF";

                if (customX !== null && customY !== null) {
                    x = customX; y = customY; color = isRoot ? "#2563eb" : "#374151"; 
                } else if (parentId) {
                    const parent = this.nodes.find(n => n.id === parentId);
                    if (parent) {
                        x = parent.x + 240; 
                        const siblings = this.nodes.filter(n => n.parentId === parentId);
                        if (siblings.length > 0) {
                            const maxY = Math.max(...siblings.map(n => n.y));
                            y = maxY + 80; 
                        } else {
                            y = parent.y;
                        }
                        if (parent.isRoot) {
                            const colors = ['#1f2937', '#374151', '#4b5563', '#6b7280', '#1f2937'];
                            color = colors[this.nodes.length % colors.length];
                        } else { color = parent.color; }
                    }
                } else { color = "#2563eb"; }

                const newNode = { id, parentId, text, x, y, isRoot, color, image: null, width: null, fontSize: isRoot ? 18 : 14 };
                this.nodes.push(newNode);

                this.selectNode(id);
                this.render();
                setTimeout(() => {
                    const el = document.querySelector(`.node[data-id="${id}"] .node-content`);
                    if(el) { el.focus(); document.execCommand('selectAll', false, null); }
                }, 50);
                return id;
            }

            deleteNode() {
                if (this.selectedConnectionId) {
                    this.extraConnections = this.extraConnections.filter(c => c.id !== this.selectedConnectionId);
                    this.selectedConnectionId = null;
                    this.render();
                    return;
                }

                if (!this.selectedNodeId) return;
                const deleteRecursive = (id) => {
                    this.extraConnections = this.extraConnections.filter(c => c.from !== id && c.to !== id);
                    const children = this.nodes.filter(n => n.parentId === id);
                    children.forEach(c => deleteRecursive(c.id));
                    this.nodes = this.nodes.filter(n => n.id !== id);
                };
                deleteRecursive(this.selectedNodeId);
                this.selectedNodeId = null;
                this.render();
            }

            addChild() { if (!this.selectedNodeId) return this.showToast("Selecciona un node"); this.addNode(this.selectedNodeId); }
            addSibling() { 
                if (!this.selectedNodeId) return; 
                const current = this.nodes.find(n => n.id === this.selectedNodeId);
                if (current.isRoot) return;
                this.addNode(current.parentId);
            }

            // --- LAYOUTS ---

            applyLayout(type) {
                // 1. SAVE STATE if leaving MindMap
                if (this.currentLayout === 'mindmap') {
                    this.nodes.forEach(n => {
                        n.mmX = n.x;
                        n.mmY = n.y;
                    });
                }

                // 2. SWITCH
                this.currentLayout = type;
                this.workspace.classList.remove('mode-outline', 'mode-hierarchy');
                
                if (type === 'outline') {
                    this.workspace.classList.add('mode-outline');
                    this.layoutOutline(true);
                } else if (type === 'hierarchy') {
                    this.workspace.classList.add('mode-hierarchy');
                    this.layoutHierarchy(true);
                } else {
                    // Switching BACK to MindMap
                    this.nodes.forEach(n => {
                        if (n.mmX !== undefined && n.mmY !== undefined) {
                            n.x = n.mmX;
                            n.y = n.mmY;
                        }
                    });
                    this.layoutMindMap();
                }
                this.zoomLevel = 1;
                this.centerView();
                this.layoutMenu.style.display = 'none';
                this.render();
            }

            layoutHierarchy(resetView = false) {
                const roots = this.nodes.filter(n => n.isRoot);
                const siblingSpacing = 40; 
                const levelHeight = 100;

                const calculateTreeWidth = (nodeId) => {
                    const children = this.nodes.filter(n => n.parentId === nodeId);
                    if (children.length === 0) return 150; 
                    let width = 0;
                    children.forEach(child => { width += calculateTreeWidth(child.id) + siblingSpacing; });
                    return width - siblingSpacing;
                };

                const assignPositions = (nodeId, x, y) => {
                    const node = this.nodes.find(n => n.id === nodeId);
                    if (!node) return;
                    if (!node.isRoot) { node.x = x; node.y = y; }

                    const children = this.nodes.filter(n => n.parentId === nodeId);
                    let startX = node.x - (calculateTreeWidth(nodeId) / 2);
                    
                    children.forEach(child => {
                        const childWidth = calculateTreeWidth(child.id);
                        const childX = startX + childWidth / 2;
                        const childY = node.y + levelHeight;
                        assignPositions(child.id, childX, childY);
                        startX += childWidth + siblingSpacing;
                    });
                };

                roots.forEach(root => {
                    if (root.x === undefined) root.x = 0;
                    if (root.y === undefined) root.y = 0;
                    assignPositions(root.id, root.x, root.y);
                });

                if(resetView) this.showToast("Vista Jerarquia aplicada");
            }

            layoutMindMap() {
                this.render();
                this.showToast("Vista de Mapa Mental");
            }

            layoutOutline(resetView = false) {
                const roots = this.nodes.filter(n => n.isRoot);
                const indentX = 250; 
                
                roots.forEach(root => {
                    let currentY = 0;
                    const layoutSubtree = (nodeId, startY) => {
                        const children = this.nodes.filter(n => n.parentId === nodeId);
                        if (children.length === 0) return 60; 

                        let totalH = children.reduce((sum, c) => sum + this.getSubtreeHeight(c.id), 0);
                        let currentY = startY - (totalH / 2);

                        children.forEach(child => {
                            const parent = this.nodes.find(n => n.id === nodeId);
                            child.x = parent.x + indentX; 
                            let h = this.getSubtreeHeight(child.id);
                            child.y = currentY + (h / 2); 
                            layoutSubtree(child.id, child.y);
                            currentY += h;
                        });
                    };
                    
                    if (root.x === undefined) root.x = 0;
                    if (root.y === undefined) root.y = 0;
                    layoutSubtree(root.id, root.y);
                });

                if(resetView) this.showToast("Vista d'Esquema aplicada");
            }

            centerView() {
                if (this.nodes.length === 0) return;
                const xs = this.nodes.map(n => n.x);
                const ys = this.nodes.map(n => n.y);
                const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
                const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
                this.panX = window.innerWidth  / 2 - cx * this.zoomLevel;
                this.panY = window.innerHeight / 2 - cy * this.zoomLevel;
            }

            getSubtreeHeight(nodeId) {
                const children = this.nodes.filter(n => n.parentId === nodeId);
                if (children.length === 0) return 60;
                return children.reduce((acc, c) => acc + this.getSubtreeHeight(c.id), 0);
            }

            // Retorna nombre de fulles (per distribuir proporcionalment en mindmap)
            getSubtreeSize(nodeId) {
                const children = this.nodes.filter(n => n.parentId === nodeId);
                if (children.length === 0) return 1;
                return children.reduce((s, c) => s + this.getSubtreeSize(c.id), 0);
            }

            // Distribueix recursivament els fills d'un node cap a un costat
            arrangeSubtree(nodeId, side, levelRadius, vSpacing) {
                const node = this.nodes.find(n => n.id === nodeId);
                const children = this.nodes.filter(n => n.parentId === nodeId);
                if (!node || children.length === 0) return;
                const totalH = children.reduce((s, c) => s + this.getSubtreeSize(c.id) * vSpacing, 0);
                let curY = node.y - totalH / 2;
                children.forEach(child => {
                    const h = this.getSubtreeSize(child.id) * vSpacing;
                    child.x = node.x + side * levelRadius;
                    child.y = curY + h / 2;
                    this.arrangeSubtree(child.id, side, levelRadius, vSpacing);
                    curY += h;
                });
            }

            // Layout radial clàssic esquerra/dreta per mapa mental
            autoArrangeMindMap() {
                const levelRadius = 200;
                const vSpacing   = 70;
                this.nodes.filter(n => n.isRoot).forEach(root => {
                    const children = this.nodes.filter(n => n.parentId === root.id);
                    const half = Math.ceil(children.length / 2);
                    const right = children.slice(0, half);
                    const left  = children.slice(half);
                    [right, left].forEach((group, idx) => {
                        const side = idx === 0 ? 1 : -1;
                        const totalH = group.reduce((s, c) => s + this.getSubtreeSize(c.id) * vSpacing, 0);
                        let curY = root.y - totalH / 2;
                        group.forEach(child => {
                            const h = this.getSubtreeSize(child.id) * vSpacing;
                            child.x = root.x + side * levelRadius;
                            child.y = curY + h / 2;
                            this.arrangeSubtree(child.id, side, levelRadius, vSpacing);
                            curY += h;
                        });
                    });
                });
            }

            autoArrange() {
                if (this.currentLayout === 'outline') {
                    this.layoutOutline(false);
                } else if (this.currentLayout === 'hierarchy') {
                    this.layoutHierarchy(false);
                } else {
                    this.autoArrangeMindMap();
                }
                this.zoomLevel = 1;
                this.centerView();
                this.render();
                this.showToast("Nodes ordenats proporcionalment");
            }

            toggleConnectMode() {
                this.isConnecting = !this.isConnecting;
                this.connectionSourceId = null;
                const btn = document.getElementById('btn-connect');
                if (this.isConnecting) {
                    btn.classList.add('active');
                    this.showToast("Mode Enllaç: Clica l'origen i després el destí");
                    this.workspace.style.cursor = "crosshair";
                } else {
                    btn.classList.remove('active');
                    this.workspace.style.cursor = "grab";
                    document.querySelectorAll('.node').forEach(n => n.classList.remove('linking-source'));
                }
            }

            addExtraConnection(sourceId, targetId) {
                if (sourceId === targetId) return;
                const exists = this.extraConnections.find(c => c.from === sourceId && c.to === targetId);
                if (!exists) {
                    this.extraConnections.push({ id: 'conn_' + Date.now(), from: sourceId, to: targetId });
                    this.renderConnections();
                }
            }

            selectNode(id) {
                this.selectedNodeId = id;
                this.selectedConnectionId = null; 
                this.render();
            }

            handleMouseDown(e) {
                if (e.target === this.workspace || e.target.closest('svg')) {
                    if (e.target.classList.contains('arrow-line')) return;

                    this.isDraggingWorkspace = true;
                    this.lastMouseX = e.clientX;
                    this.lastMouseY = e.clientY;
                    this.workspace.classList.add('grabbing');
                    this.selectNode(null);
                    if (this.isConnecting) this.toggleConnectMode();
                }
            }

            handleNodeMouseDown(e, id) {
                e.stopPropagation();
                if (this.isConnecting) {
                    if (!this.connectionSourceId) {
                        this.connectionSourceId = id;
                        this.showToast("Origen seleccionat. Ara clica el destí.");
                        const el = document.querySelector(`.node[data-id="${id}"]`);
                        if (el) el.classList.add('linking-source');
                    } else {
                        this.addExtraConnection(this.connectionSourceId, id);
                        this.toggleConnectMode();
                        this.showToast("Nodes connectats!");
                    }
                    return;
                }
                
                const node = this.nodes.find(n => n.id === id);
                this.draggedNodeId = id;
                this.dragMoved = false;
                this.selectNode(id);
                this.lastMouseX = e.clientX;
                this.lastMouseY = e.clientY;
            }

            handleResizeMouseDown(e, id) {
                e.stopPropagation();
                this.isResizing = true;
                this.resizingNodeId = id;
                this.resizeStartX = e.clientX;
                const el = document.querySelector(`.node[data-id="${id}"]`);
                this.resizeStartWidth = el.offsetWidth;
            }

            handleMouseMove(e) {
                const dx = (e.clientX - this.lastMouseX) / this.zoomLevel;
                const dy = (e.clientY - this.lastMouseY) / this.zoomLevel;

                if (this.isResizing && this.resizingNodeId) {
                    const node = this.nodes.find(n => n.id === this.resizingNodeId);
                    if (node) {
                        const el = document.querySelector(`.node[data-id="${node.id}"]`);
                        const currentWidth = (e.clientX - this.resizeStartX) / this.zoomLevel + this.resizeStartWidth;
                        node.width = Math.max(80, currentWidth);
                        if (el) { el.style.width = node.width + 'px'; el.style.maxWidth = 'none'; }
                        this.renderConnections();
                    }
                } else if (this.isDraggingWorkspace) {
                    this.panX += e.clientX - this.lastMouseX; 
                    this.panY += e.clientY - this.lastMouseY;
                    this.updateTransform();
                } else if (this.draggedNodeId) {
                    const node = this.nodes.find(n => n.id === this.draggedNodeId);
                    if (node) {
                        this.dragMoved = true;
                        node.x += dx; node.y += dy;
                        // Si estem en MindMap, actualitzem la memòria
                        if (this.currentLayout === 'mindmap') {
                            node.mmX = node.x;
                            node.mmY = node.y;
                        }
                        this.renderNode(node);
                        this.renderConnections();
                    }
                }
                this.lastMouseX = e.clientX;
                this.lastMouseY = e.clientY;
            }
            
            handleMouseUp() {
                if (this.draggedNodeId && this.dragMoved) {
                    const node = this.nodes.find(n => n.id === this.draggedNodeId);
                    if (node && node.isRoot) {
                        if (this.currentLayout === 'outline') this.layoutOutline(false);
                        if (this.currentLayout === 'hierarchy') this.layoutHierarchy(false);
                    }
                }
                this.isDraggingWorkspace = false;
                this.draggedNodeId = null;
                this.isResizing = false;
                this.workspace.classList.remove('grabbing');
            }

            handleKeyDown(e) {
                const isEditing = document.activeElement && document.activeElement.classList.contains('node-content');
                if (isEditing) return;
                switch(e.key) {
                    case 'Tab': e.preventDefault(); this.addChild(); break;
                    case 'Enter': e.preventDefault(); this.addSibling(); break;
                    case 'Delete': case 'Backspace': this.deleteNode(); break;
                }
            }

            render() {
                this.nodesLayer.innerHTML = '';
                this.updateTransform();
                this.nodes.forEach(node => {
                    const el = this.createNodeElement(node);
                    this.nodesLayer.appendChild(el);
                });
                this.renderConnections();
            }

            renderNode(node) {
                const el = document.querySelector(`.node[data-id="${node.id}"]`);
                if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
            }

            createNodeElement(node) {
                const el = document.createElement('div');
                el.className = `node ${node.id === this.selectedNodeId ? 'selected' : ''} ${node.isRoot ? 'root-node' : ''}`;
                
                if (this.isConnecting && this.connectionSourceId === node.id) el.classList.add('linking-source');

                el.dataset.id = node.id;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                
                
                // CRITIC: Permetre ample en outline si està definit (pels nodes amb imatges)
                if (node.width) { 
                    el.style.width = node.width + 'px'; el.style.maxWidth = 'none'; 
                }
                
                if (this.currentLayout === 'outline') {
                    el.style.backgroundColor = 'transparent';
                    el.style.color = '#e5e7eb'; 
                } else {
                    if (!node.isRoot) el.style.backgroundColor = node.color;
                    else el.style.backgroundColor = "#2563eb"; 
                    
                    el.style.color = '#f9fafb';
                }
                
                if (node.fontSize) el.style.fontSize = node.fontSize + 'px';

                // SECURITY: valida que node.image sigui un data URI de format raster permès
                const allowedImgTypes = ['data:image/jpeg', 'data:image/png', 'data:image/gif', 'data:image/webp'];
                const safeImage = node.image && allowedImgTypes.some(t => String(node.image).startsWith(t)) ? node.image : null;
                const imgHtml = safeImage ? `<img src="${safeImage}" class="node-img">` : '';

                // SECURITY: node.text s'escapa amb escapeHTML per evitar XSS via innerHTML
                el.innerHTML = `
                    <div class="flex flex-col items-center w-full">
                        ${imgHtml}
                        <div class="node-content" contentEditable="true">${this.escapeHTML(node.text)}</div>
                    </div>
                    <div class="resize-handle" title="Arrossega per canviar la mida"></div>
                `;

                const contentDiv = el.querySelector('.node-content');
                
                // KEYDOWN SPECIFIC FOR NODE CONTENT (ENTER / ALT+ENTER)
                contentDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        if (e.altKey) {
                            // ALT+ENTER -> New line
                            e.stopPropagation(); 
                        } else {
                            // ENTER ONLY -> Finish editing
                            e.preventDefault();
                            e.stopPropagation();
                            e.target.blur();
                        }
                    }
                });

                // SECURITY: límit de 2000 caràcters per evitar DoS via texts molt llargs
                contentDiv.addEventListener('blur', (e) => {
                    const raw = e.target.innerText || '';
                    node.text = raw.length > 2000 ? raw.substring(0, 2000) : raw;
                    if (raw.length > 2000) e.target.innerText = node.text;
                });
                contentDiv.addEventListener('mousedown', (e) => { if (this.selectedNodeId === node.id) e.stopPropagation(); });
                
                el.addEventListener('mousedown', (e) => this.handleNodeMouseDown(e, node.id));
                const resizeHandle = el.querySelector('.resize-handle');
                resizeHandle.addEventListener('mousedown', (e) => this.handleResizeMouseDown(e, node.id));

                return el;
            }

            renderConnections() {
                this.svgGroup.innerHTML = '';
                this.nodes.forEach(node => {
                    if (node.parentId) {
                        const parent = this.nodes.find(n => n.id === node.parentId);
                        if (parent) this.drawTreeConnection(parent, node);
                    }
                });
                this.extraConnections.forEach(conn => {
                    const from = this.nodes.find(n => n.id === conn.from);
                    const to = this.nodes.find(n => n.id === conn.to);
                    if (from && to) this.drawArrowConnection(conn.id, from, to);
                });
            }

            drawTreeConnection(parent, child) {
                let startX = parent.x;
                let startY = parent.y;
                let endX = child.x;
                let endY = child.y;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("class", "connection-line");
                path.setAttribute("stroke", '#9ca3af'); 

                let d = "";
                
                if (this.currentLayout === 'outline') {
                    const parentEl = document.querySelector(`.node[data-id="${parent.id}"]`);
                    if (parentEl) startX += parentEl.offsetWidth + 20; 
                    else startX += 60; 

                    const safetyX = startX + 20; 
                    const stopChildX = endX - 15; 
                    
                    d = `M ${startX} ${startY} L ${safetyX} ${startY} L ${safetyX} ${endY} L ${stopChildX} ${endY}`;
                
                } else if (this.currentLayout === 'hierarchy') {
                    const pHeight = 40; 
                    const dropY = startY + (pHeight/2);
                    const enterY = endY - (pHeight/2);
                    const midY = (dropY + enterY) / 2;
                    const r = 10; 
                    if (Math.abs(enterY - dropY) < 20) {
                        d = `M ${startX} ${startY} L ${endX} ${endY}`;
                    } else {
                        const dir = endX > startX ? 1 : -1;
                        d = `M ${startX} ${startY + 20} L ${startX} ${midY - r} Q ${startX} ${midY} ${startX + (r*dir)} ${midY} L ${endX - (r*dir)} ${midY} Q ${endX} ${midY} ${endX} ${midY + r} L ${endX} ${endY - 20}`;
                    }
                } else {
                    const cp1x = startX + (endX - startX) / 2;
                    const cp1y = startY;
                    const cp2x = startX + (endX - startX) / 2;
                    const cp2y = endY;
                    d = `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`;
                }
                path.setAttribute("d", d);
                this.svgGroup.appendChild(path);
            }

            drawArrowConnection(id, from, to) {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("class", "arrow-line");
                if (this.selectedConnectionId === id) {
                    path.setAttribute("class", "arrow-line selected");
                }
                
                const toEl = document.querySelector(`.node[data-id="${to.id}"]`);
                let targetX = to.x;
                let targetY = to.y;
                if (toEl) {
                   const w = toEl.offsetWidth;
                   const h = toEl.offsetHeight;
                   const dx = to.x - from.x;
                   const dy = to.y - from.y;
                   const angle = Math.atan2(dy, dx);
                   const absCos = Math.abs(Math.cos(angle));
                   const absSin = Math.abs(Math.sin(angle));
                   let distToEdge;
                   if ((w/2) * absSin <= (h/2) * absCos) distToEdge = (w/2) / absCos;
                   else distToEdge = (h/2) / absSin;
                   
                   targetX = to.x - Math.cos(angle) * (distToEdge + 25);
                   targetY = to.y - Math.sin(angle) * (distToEdge + 25);
                }

                const d = `M ${from.x} ${from.y} L ${targetX} ${targetY}`;
                path.setAttribute("d", d);
                
                // HIT PATH per selecció fàcil
                const hitPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                hitPath.setAttribute("fill", "none"); 
                hitPath.setAttribute("stroke", "transparent"); 
                hitPath.setAttribute("stroke-width", "20"); 
                hitPath.style.pointerEvents = "stroke"; 
                hitPath.style.cursor = "pointer";
                hitPath.setAttribute("d", d);
                hitPath.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    this.selectedConnectionId = id;
                    this.selectedNodeId = null; 
                    this.render(); 
                });
                
                this.svgGroup.appendChild(hitPath);
                this.svgGroup.appendChild(path);
            }

            saveToJSON() {
                const data = { nodes: this.nodes, connections: this.extraConnections };
                const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "mapa_mental.json"; a.click();
            }
            loadFromJSON(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const safeId = (v) => String(v || '').replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 64);
                        const allowedImg = ['data:image/jpeg', 'data:image/png', 'data:image/gif', 'data:image/webp'];
                        // SECURITY: cada camp del node es valida i saniteja abans d'acceptar-lo
                        this.nodes = (data.nodes || []).map(n => ({
                            id:       safeId(n.id),
                            parentId: n.parentId ? safeId(n.parentId) : null,
                            text:     String(n.text || '').substring(0, 2000),
                            x:        Number(n.x) || 0,
                            y:        Number(n.y) || 0,
                            isRoot:   Boolean(n.isRoot),
                            color:    this.sanitizeColor(n.color),
                            image:    n.image && allowedImg.some(t => String(n.image).startsWith(t)) ? n.image : null,
                            width:    n.width ? Math.min(Math.max(Number(n.width) || 200, 50), 1200) : null,
                            fontSize: n.fontSize ? Math.min(Math.max(Number(n.fontSize) || 14, 10), 64) : 14
                        }));
                        this.extraConnections = (data.connections || []).map(c => ({
                            id:   safeId(c.id),
                            from: safeId(c.from),
                            to:   safeId(c.to)
                        }));
                        this.render();
                        this.showToast("Mapa carregat");
                    } catch(err) {
                        this.showToast("Error: fitxer JSON invàlid");
                    }
                };
                reader.readAsText(file);
            }
            
            // MODIFICAT: Export PNG amb fons transparent
            async exportPNG() {
                if (this.nodes.length === 0) return;
                this.showToast("Generant imatge...");
                
                const oldZoom = this.zoomLevel; const oldPanX = this.panX; const oldPanY = this.panY;
                const oldW = this.workspace.style.width; const oldH = this.workspace.style.height;
                this.zoomLevel = 1;
                
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                this.nodes.forEach(n => {
                    const w = n.width || 200;
                    minX = Math.min(minX, n.x - w/2); maxX = Math.max(maxX, n.x + w/2);
                    minY = Math.min(minY, n.y - 40); maxY = Math.max(maxY, n.y + 40);
                });
                
                const padding = 60;
                const width = maxX - minX + padding * 2;
                const height = maxY - minY + padding * 2;
                
                this.panX = -minX + padding; this.panY = -minY + padding;
                this.updateTransform();
                
                this.workspace.style.width = `${width}px`; this.workspace.style.height = `${height}px`;
                
                try {
                    const canvas = await html2canvas(this.workspace, { 
                        backgroundColor: null, // Fons transparent
                        logging: false,
                        onclone: (clonedDoc) => {
                            const clonedWorkspace = clonedDoc.getElementById('workspace');
                            if (clonedWorkspace) {
                                // Eliminar fons CSS en la captura
                                clonedWorkspace.style.background = 'none';
                                clonedWorkspace.style.backgroundColor = 'transparent';
                            }
                        }
                    });
                    const link = document.createElement('a'); link.download = 'mapa_mental.png'; link.href = canvas.toDataURL(); link.click();
                    this.showToast("Imatge PNG descarregada");
                } catch (err) { console.error(err); this.showToast("Error generant imatge"); }
                finally {
                    this.zoomLevel = oldZoom; this.panX = oldPanX; this.panY = oldPanY;
                    this.workspace.style.width = oldW; this.workspace.style.height = oldH;
                    this.updateTransform();
                }
            }

            exportHTML() {
                const htmlContent = document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], {type: "text/html"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "mapa_publicat.html"; a.click();
                this.showToast("HTML exportat");
            }
            setNodeColor(color) {
                if (this.selectedNodeId) {
                    const node = this.nodes.find(n => n.id === this.selectedNodeId);
                    // SECURITY: valida el color per evitar injecció CSS via JSON o paràmetre
                    node.color = this.sanitizeColor(color);
                    this.render();
                    this.colorMenu.style.display = 'none';
                }
            }
            attachImage(input) {
                if (!this.selectedNodeId || !input.files[0]) return;
                const file = input.files[0];
                // SECURITY: només s'accepten formats d'imatge raster segurs; SVG rebutjat
                const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    this.showToast("Format no permès. Usa PNG, JPG, GIF o WEBP.");
                    input.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const node = this.nodes.find(n => n.id === this.selectedNodeId);
                    node.image = e.target.result;
                    if (!node.width) node.width = 200;
                    this.render();
                };
                reader.readAsDataURL(file);
                input.value = '';
            }
            adjustFontSize(delta) {
                if (!this.selectedNodeId) return this.showToast("Selecciona un node");
                const node = this.nodes.find(n => n.id === this.selectedNodeId);
                if (node) {
                    if (!node.fontSize) node.fontSize = node.isRoot ? 18 : 14;
                    node.fontSize += delta;
                    if (node.fontSize < 10) node.fontSize = 10;
                    if (node.fontSize > 64) node.fontSize = 64;
                    this.render();
                }
            }
            toggleColorMenu(e) { const rect = e.target.getBoundingClientRect(); this.colorMenu.style.top = (rect.bottom + 5) + 'px'; this.colorMenu.style.left = rect.left + 'px'; this.colorMenu.style.display = 'block'; this.layoutMenu.style.display = 'none'; }
            toggleLayoutMenu(e) { const rect = e.target.closest('button').getBoundingClientRect(); this.layoutMenu.style.top = (rect.bottom + 5) + 'px'; this.layoutMenu.style.left = rect.left + 'px'; this.layoutMenu.style.display = 'block'; this.colorMenu.style.display = 'none'; }
            showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        }

        window.onload = () => { 
            window.app = new MindMapApp(); 
            window.app.init(); 
        };
    </script>
</body>
