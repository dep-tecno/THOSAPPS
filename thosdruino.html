<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THOSDRUINO – Simulador Visual</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--green:#00e676;--text:#e2e8f0;--muted:#8892a4;--border:#2d3347;--red:#ff5555}
html{scroll-behavior:smooth}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
nav{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:56px}
.nav-brand{font-size:.8rem;font-weight:700;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-right:1.5rem;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:.6rem}
.nav-links{display:flex;list-style:none}
.nav-links a{display:block;padding:0 .9rem;height:56px;line-height:56px;font-size:.82rem;font-weight:500;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--green);border-bottom-color:var(--green)}
#toolbar{display:flex;align-items:center;gap:.5rem;padding:.4rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);height:44px;flex-shrink:0}
#toolbar select,#toolbar button{height:30px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:.25rem .6rem;font-size:.8rem;cursor:pointer}
#toolbar button:hover{border-color:var(--green);color:var(--green)}
#app{display:flex;flex:1;overflow:hidden}
#palette{width:190px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.pal-section{padding:.5rem .8rem .3rem}
.pal-title{font-size:.65rem;font-weight:700;color:var(--green);opacity:.7;margin-bottom:.3rem}
.pal-item{display:flex;align-items:center;gap:.4rem;padding:.35rem .5rem;border-radius:6px;cursor:pointer;margin-bottom:1px;transition:all .15s}
.pal-item:hover{background:var(--bg3);color:var(--green)}
.pal-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:5px;font-size:1rem}
.pal-text{font-size:.75rem;line-height:1.3;flex:1}
.pal-label{font-weight:500}
#canvas-wrap{flex:1;overflow:hidden;background:#0a0c10;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:20px 20px}
#canvas{width:100%;height:100%;display:block}
.pin-circle{fill:rgba(255,255,255,.05);stroke:rgba(255,255,255,.2);stroke-width:1;cursor:crosshair;transition:all .1s}
.pin-circle:hover{fill:rgba(0,230,118,.3);stroke:var(--green);stroke-width:2}
.comp-group.selected>.comp-rect{display:block}
.comp-rect{display:none;fill:none;stroke:var(--green);stroke-width:1.5;stroke-dasharray:5 3;pointer-events:none}
.wire{fill:none;stroke-width:2.5;stroke-linecap:round;cursor:pointer}
.wire:hover{stroke-width:3.5;opacity:.8}
#props{width:0;background:var(--bg2);border-left:1px solid var(--border);overflow:hidden;transition:width .2s;display:flex;flex-direction:column}
#props.open{width:220px}
#props-hdr{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:.8rem;color:var(--green)}
#props-body{padding:.8rem 1rem;overflow-y:auto;flex:1;font-size:.8rem}
</style>
</head>
<body>

<nav>
<a class="nav-brand" href="index.html"><img src="logonew.png" alt="Logo" style="height:36px">Dep. Tecnologia</a>
<ul class="nav-links">
<li><a href="index.html">Inici</a></li>
<li><a href="thosdruino.html" class="active">THOSDRUINO</a></li>
</ul>
</nav>

<div id="toolbar">
<select id="sel-board"><option value="uno">Arduino Uno</option><option value="esp32">ESP32</option></select>
<button id="btn-zoom-in">+ Amplia</button><span id="zoom-pct">100%</span><button id="btn-zoom-out">− Redueix</button>
<span style="margin-left:auto">Cable:</span>
<div id="wire-colors" style="display:flex;gap:4px">
<div class="wc-dot active" data-color="#e53935" style="background:#e53935;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
<div class="wc-dot" data-color="#212121" style="background:#555;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
<div class="wc-dot" data-color="#1e88e5" style="background:#1e88e5;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
<div class="wc-dot" data-color="#43a047" style="background:#43a047;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
</div>
<button id="btn-delete">✕ Eliminar</button>
<button id="btn-clear">⊘ Netejar</button>
</div>

<div id="app">
<aside id="palette"></aside>
<div id="canvas-wrap"><svg id="canvas" xmlns="http://www.w3.org/2000/svg"><defs id="defs"></defs><g id="world"><g id="boards"></g><g id="components"></g><g id="wires"></g></g></svg></div>
<aside id="props"><div id="props-hdr"><span>Propietats</span><button onclick="closeProps()">✕</button></div><div id="props-body"></div></aside>
</div>

<script>
const NS='http://www.w3.org/2000/svg';

function s(t,a={},c=[]){
  const e=document.createElementNS(NS,t);
  Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));
  if(typeof c==='string')e.textContent=c;
  else c.forEach(x=>{if(typeof x==='string')e.textContent=x;else e.appendChild(x)});
  return e;
}

function setupDefs(){
  const d=document.getElementById('defs');
  [['red','#ff5252','#b71c1c'],['green','#69f0ae','#1b5e20'],['blue','#448aff','#0d47a1']].forEach(([n,l,dk])=>{
    const g=s('radialGradient',{id:`led-${n}`,cx:'35%',cy:'30%',r:'60%'},[
      s('stop',{'offset':'0%','stop-color':l}),
      s('stop',{'offset':'100%','stop-color':dk})
    ]);
    d.appendChild(g);
  });
  const p=s('linearGradient',{id:'pcb',x2:'0',y2:'1'},[s('stop',{'offset':'0%','stop-color':'#2e7d32'}),s('stop',{'offset':'100%','stop-color':'#1b5e20'})]);
  d.appendChild(p);
}

const COMPS={
  'led-red':{icon:'🔴',label:'LED Vermell',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){g.appendChild(s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-red)',stroke:'#8b0000','stroke-width':'1.5'}))}},
  'led-green':{icon:'🟢',label:'LED Verd',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){g.appendChild(s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-green)',stroke:'#0b4d00','stroke-width':'1.5'}))}},
  'led-blue':{icon:'🔵',label:'LED Blau',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){g.appendChild(s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-blue)',stroke:'#0d2566','stroke-width':'1.5'}))}},
  'resistor':{icon:'〰️',label:'Resistència',w:80,h:30,pins:[{id:'1',x:0,y:15},{id:'2',x:80,y:15}],render(g){g.appendChild(s('rect',{x:15,y:8,width:50,height:14,rx:2,fill:'#d4b896',stroke:'#7a6f5d','stroke-width':'1'}));for(let i=0;i<4;i++)g.appendChild(s('rect',{x:20+i*10,y:8,width:3,height:14,fill:['#e53935','#1e88e5','#f9a825','#e6e600'][i]}))}},
  'button':{icon:'⊙',label:'Botó',w:50,h:50,pins:[{id:'1',x:5,y:10},{id:'2',x:5,y:40},{id:'3',x:45,y:10},{id:'4',x:45,y:40}],render(g){g.appendChild(s('rect',{x:5,y:5,width:40,height:40,rx:4,fill:'#e0e0e0',stroke:'#999','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:25,cy:25,r:12,fill:'#ffd700',stroke:'#b8860b','stroke-width':'1'}))}},
  'buzzer':{icon:'🔊',label:'Buzzer',w:50,h:55,pins:[{id:'+',x:15,y:53},{id:'-',x:35,y:53}],render(g){g.appendChild(s('rect',{x:8,y:5,width:34,height:30,rx:3,fill:'#1a1a1a',stroke:'#333','stroke-width':'1.5'}))}},
  'dht11':{icon:'💧',label:'DHT11',w:60,h:80,pins:[{id:'V',x:18,y:78},{id:'D',x:30,y:78},{id:'G',x:42,y:78}],render(g){g.appendChild(s('rect',{x:5,y:10,width:50,height:60,rx:3,fill:'#4a90e2',stroke:'#0d47a1','stroke-width':'1.5'}));g.appendChild(s('text',{x:30,y:35,'text-anchor':'middle','font-size':'9','fill':'#fff'},'DHT11'))}},
  'hc-sr04':{icon:'📡',label:'HC-SR04',w:100,h:55,pins:[{id:'V',x:15,y:53},{id:'T',x:35,y:53},{id:'E',x:65,y:53},{id:'G',x:85,y:53}],render(g){g.appendChild(s('rect',{x:5,y:8,width:90,height:40,rx:2,fill:'#e0e0e0',stroke:'#999','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:25,cy:20,r:8,fill:'#fff',stroke:'#999'}));g.appendChild(s('circle',{cx:75,cy:20,r:8,fill:'#fff',stroke:'#999'}))}},
  'pir':{icon:'🔴',label:'PIR',w:60,h:65,pins:[{id:'V',x:18,y:63},{id:'O',x:30,y:63},{id:'G',x:42,y:63}],render(g){g.appendChild(s('rect',{x:10,y:5,width:40,height:35,rx:2,fill:'#f0f0f0'}));g.appendChild(s('circle',{cx:30,cy:30,r:18,fill:'#e8e8e8',stroke:'#999','stroke-width':'1.5'}))}},
  'ldr':{icon:'☀️',label:'LDR',w:40,h:50,pins:[{id:'1',x:12,y:48},{id:'2',x:28,y:48}],render(g){g.appendChild(s('circle',{cx:20,cy:20,r:12,fill:'#ffeb3b',stroke:'#f57f17','stroke-width':'1.5'}))}},
  'pot':{icon:'🎚️',label:'Potenciòmetre',w:60,h:65,pins:[{id:'G',x:18,y:63},{id:'W',x:30,y:63},{id:'V',x:42,y:63}],render(g){g.appendChild(s('circle',{cx:30,cy:25,r:18,fill:'#8b4513',stroke:'#5a2a0a','stroke-width':'1.5'}))}},
  'servo':{icon:'⚙️',label:'Servo',w:80,h:70,pins:[{id:'G',x:20,y:68},{id:'S',x:40,y:68},{id:'V',x:60,y:68}],render(g){g.appendChild(s('rect',{x:10,y:10,width:60,height:50,rx:3,fill:'#8B4513',stroke:'#5a2a0a','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:40,cy:20,r:8,fill:'#333'}))}},
  'motor':{icon:'⚡',label:'Motor DC',w:70,h:80,pins:[{id:'+',x:20,y:0},{id:'-',x:50,y:0}],render(g){g.appendChild(s('circle',{cx:35,cy:35,r:28,fill:'#ff6b6b',stroke:'#c92a2a','stroke-width':'1.5'}))}},
  'lcd':{icon:'📺',label:'LCD 16×2',w:200,h:90,pins:[{id:'1',x:10,y:88},{id:'2',x:30,y:88},{id:'3',x:50,y:88},{id:'4',x:70,y:88},{id:'5',x:90,y:88},{id:'6',x:110,y:88}],render(g){g.appendChild(s('rect',{x:5,y:8,width:190,height:70,rx:3,fill:'#d0e8f2',stroke:'#01579b','stroke-width':'2'}));g.appendChild(s('rect',{x:15,y:18,width:170,height:40,fill:'#001d3d'}))}}
};

const state={board:'uno',components:[],wires:[],view:{x:0,y:0,s:1},selected:null,wireMode:false,wireStart:null,wireColor:'#e53935',compId:0};

function buildPalette(){
  const p=document.getElementById('palette');
  const basics=['led-red','led-green','led-blue','resistor','button','buzzer'];
  const sensors=['dht11','hc-sr04','pir','ldr'];
  const actuators=['pot','servo','motor','lcd'];
  [['Bàsics',basics],['Sensors',sensors],['Actuadors',actuators]].forEach(([title,items])=>{
    const sec=document.createElement('div');
    sec.className='pal-section';
    const tit=document.createElement('div');
    tit.className='pal-title';
    tit.textContent=title;
    sec.appendChild(tit);
    items.forEach(cid=>{
      const c=COMPS[cid];
      const item=document.createElement('div');
      item.className='pal-item';
      item.innerHTML=`<div class="pal-icon">${c.icon}</div><div class="pal-text"><div class="pal-label">${c.label}</div></div>`;
      item.onclick=()=>addComponent(cid);
      sec.appendChild(item);
    });
    p.appendChild(sec);
  });
}

function addComponent(cid){
  const c=COMPS[cid];
  const r=document.getElementById('canvas').getBoundingClientRect();
  const x=(r.width/2-state.view.x)/state.view.s;
  const y=(r.height/2-state.view.y)/state.view.s;
  const comp={id:state.compId++,type:cid,x,y};
  state.components.push(comp);
  renderAll();
  select(comp.id);
}

function renderAll(){
  renderBoards();
  renderComponents();
  renderWires();
}

function renderBoards(){
  const g=document.getElementById('boards');
  g.innerHTML='';
  if(state.board==='uno'){
    const board=s('g',{id:'board-0',class:'comp-group',transform:'translate(80,60)scale(0.7)'});
    board.appendChild(s('rect',{x:0,y:10,width:360,height:220,rx:10,fill:'url(#pcb)',stroke:'#1a4d1e','stroke-width':2}));
    board.appendChild(s('rect',{x:0,y:80,width:28,height:40,rx:2,fill:'#777'}));
    board.appendChild(s('rect',{x:305,y:60,width:20,height:20,rx:3,fill:'#e53935'}));
    board.appendChild(s('rect',{x:140,y:80,width:80,height:60,rx:3,fill:'#1a1a1a'}));
    board.appendChild(s('text',{x:180,y:115,'text-anchor':'middle','font-size':8,'fill':'#666'},'ATmega328P'));
    const pins=['D0','D1','D2','D3','D4','D5','D6','D7','D8','D9','D10','D11','D12','D13','AREF','GND'];
    pins.forEach((p,i)=>{
      const x=50+i*18;
      board.appendChild(s('circle',{cx:x,cy:0,r:6,class:'pin-circle','data-pin':p}));
      board.appendChild(s('text',{x:x,y:24,'text-anchor':'middle','font-size':'5.5','fill':'#a5d6a7'},p));
    });
    const apins=['3V3','5V','GND','GND','VIN','A0','A1','A2','A3','A4','A5'];
    apins.forEach((p,i)=>{
      const x=50+i*18;
      board.appendChild(s('circle',{cx:x,cy:240,r:6,class:'pin-circle','data-pin':p}));
      board.appendChild(s('text',{x:x,y:256,'text-anchor':'middle','font-size':'5.5','fill':'#a5d6a7'},p));
    });
    g.appendChild(board);
  }
}

function renderComponents(){
  const g=document.getElementById('components');
  g.innerHTML='';
  state.components.forEach(c=>{
    const d=COMPS[c.type];
    const cg=s('g',{id:`comp-${c.id}`,class:'comp-group',transform:`translate(${c.x},${c.y})`,style:'cursor:grab'});
    cg.dataset.id=c.id;
    if(state.selected===c.id)cg.classList.add('selected');
    d.render(cg);
    cg.appendChild(s('rect',{class:'comp-rect',x:-5,y:-5,width:d.w+10,height:d.h+10,rx:4}));
    d.pins.forEach(p=>cg.appendChild(s('circle',{cx:p.x,cy:p.y,r:5,class:'pin-circle','data-pin':p.id})));
    g.appendChild(cg);
  });
}

function renderWires(){
  const g=document.getElementById('wires');
  g.innerHTML='';
  state.wires.forEach(w=>{
    const dx=Math.abs(w.x2-w.x1),dy=Math.abs(w.y2-w.y1);
    let d='';
    if(dx>dy){const h=(w.x1+w.x2)/2;d=`M ${w.x1} ${w.y1} C ${h} ${w.y1}, ${h} ${w.y2}, ${w.x2} ${w.y2}`;}
    else{const h=(w.y1+w.y2)/2;d=`M ${w.x1} ${w.y1} C ${w.x1} ${h}, ${w.x2} ${h}, ${w.x2} ${w.y2}`;}
    g.appendChild(s('path',{d,class:'wire',stroke:w.color}));
  });
}

const canvas=document.getElementById('canvas');
let panStart,dragComp;

canvas.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left-state.view.x)/state.view.s;
  const y=(e.clientY-r.top-state.view.y)/state.view.s;
  const t=document.elementFromPoint(e.clientX,e.clientY);

  if(t.classList.contains('pin-circle')){
    if(state.wireMode){
      state.wires.push({x1:state.wireStart.x,y1:state.wireStart.y,x2:x,y2:y,color:state.wireColor});
      state.wireMode=false;
    }else{
      state.wireMode=true;
      state.wireStart={x,y};
    }
    renderWires();
    return;
  }

  const c=t.closest('.comp-group');
  if(c){select(+c.dataset.id);dragComp={id:+c.dataset.id,sx:x,sy:y};return;}
  panStart={sx:e.clientX,sy:e.clientY};
});

canvas.addEventListener('mousemove',e=>{
  if(dragComp){
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left-state.view.x)/state.view.s;
    const y=(e.clientY-r.top-state.view.y)/state.view.s;
    const c=state.components.find(c=>c.id===dragComp.id);
    if(c){c.x+=x-dragComp.sx;c.y+=y-dragComp.sy;dragComp.sx=x;dragComp.sy=y;renderAll();}
  }
  if(panStart){state.view.x+=e.clientX-panStart.sx;state.view.y+=e.clientY-panStart.sy;updateView();panStart={sx:e.clientX,sy:e.clientY};}
});

canvas.addEventListener('mouseup',()=>{panStart=null;dragComp=null;});
canvas.addEventListener('wheel',e=>{e.preventDefault();state.view.s*=e.deltaY>0?0.9:1.1;updateView();});

document.getElementById('btn-zoom-in').onclick=()=>{state.view.s*=1.2;updateView();};
document.getElementById('btn-zoom-out').onclick=()=>{state.view.s/=1.2;updateView();};
document.getElementById('btn-delete').onclick=()=>{if(state.selected>0){state.components=state.components.filter(c=>c.id!==state.selected);renderAll();}};
document.getElementById('btn-clear').onclick=()=>{if(confirm('Netejar?')){state.components=[];state.wires=[];renderAll();}};
document.getElementById('sel-board').onchange=e=>{state.board=e.target.value;renderBoards();};
document.getElementById('wire-colors').querySelectorAll('.wc-dot').forEach(d=>d.onclick=()=>{document.querySelectorAll('.wc-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active');state.wireColor=d.dataset.color;});

function select(id){state.selected=id;document.querySelectorAll('.comp-group').forEach(e=>e.classList.remove('selected'));if(id>0)document.getElementById(`comp-${id}`).classList.add('selected');renderAll();}
function updateView(){document.getElementById('world').setAttribute('transform',`translate(${state.view.x},${state.view.y})scale(${state.view.s})`);document.getElementById('zoom-pct').textContent=Math.round(state.view.s*100)+'%';}
function closeProps(){document.getElementById('props').classList.remove('open');}

setupDefs();buildPalette();updateView();renderAll();
</script>
</body>
</html>
