<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THOSDRUINO – Simulador Visual de Circuits</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--green:#00e676;--green-dim:#00b854;--text:#e2e8f0;--muted:#8892a4;--border:#2d3347;--radius:12px;--red:#ff5555}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:56px;flex-shrink:0}
nav::-webkit-scrollbar{display:none}
.nav-brand{font-size:.8rem;font-weight:700;color:var(--green);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;margin-right:1.5rem;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:.6rem}
.nav-links{display:flex;list-style:none;flex-shrink:0}
.nav-links a{display:block;padding:0 .9rem;height:56px;line-height:56px;font-size:.82rem;font-weight:500;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color .2s;border-bottom:2px solid transparent}
.nav-links a:hover,.nav-links a.active{color:var(--green);border-bottom-color:var(--green)}

/* TOOLBAR */
#toolbar{display:flex;align-items:center;gap:.5rem;padding:.4rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;height:44px}
#toolbar select,#toolbar button{height:30px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:.25rem .6rem;font-size:.8rem;cursor:pointer;transition:all .15s}
#toolbar button:hover{border-color:var(--green);color:var(--green)}
.tbtn-sep{width:1px;height:24px;background:var(--border);margin:0 .25rem}
.wc-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;margin:0 3px}
.wc-dot.active{border-color:#fff;transform:scale(1.15)}

/* MAIN LAYOUT */
#app{display:flex;flex:1;overflow:hidden}

/* PALETTE */
#palette{width:190px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
#palette::-webkit-scrollbar{width:4px}
#palette::-webkit-scrollbar-thumb{background:var(--border)}
.pal-section{padding:.5rem .8rem .3rem}
.pal-title{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);opacity:.7;margin-bottom:.3rem}
.pal-item{display:flex;align-items:center;gap:.4rem;padding:.35rem .5rem;border-radius:6px;cursor:pointer;margin-bottom:1px;transition:all .15s;user-select:none}
.pal-item:hover{background:var(--bg3);color:var(--green)}
.pal-icon{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:5px;font-size:1rem}
.pal-text{font-size:.75rem;line-height:1.3;flex:1}
.pal-label{font-weight:500}
.pal-sub{font-size:.65rem;color:var(--muted)}

/* CANVAS */
#canvas-wrap{flex:1;overflow:hidden;background:#0a0c10;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:20px 20px}
#canvas{width:100%;height:100%;display:block}
#canvas.panning{cursor:grabbing}
#canvas.wire-mode{cursor:crosshair}
.pin-circle{fill:rgba(255,255,255,.05);stroke:rgba(255,255,255,.2);stroke-width:1;cursor:crosshair;transition:all .1s}
.pin-circle:hover,.pin-circle.hover{fill:rgba(0,230,118,.3);stroke:var(--green);stroke-width:2}
.comp-group.selected > .comp-rect{display:block}
.comp-rect{display:none;fill:none;stroke:var(--green);stroke-width:1.5;stroke-dasharray:5 3;pointer-events:none}
.wire{fill:none;stroke-width:2.5;stroke-linecap:round;cursor:pointer}
.wire:hover{stroke-width:3.5;opacity:.8}

/* PROPS PANEL */
#props{width:0;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);overflow:hidden;transition:width .2s;display:flex;flex-direction:column}
#props.open{width:220px}
#props-hdr{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;font-size:.8rem;color:var(--green);font-weight:700}
#props-hdr button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem}
#props-body{padding:.8rem 1rem;overflow-y:auto;flex:1;font-size:.8rem}
.prop-row{margin-bottom:.8rem}
.prop-label{color:var(--muted);font-size:.7rem;text-transform:uppercase;margin-bottom:.25rem}
.prop-val{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.3rem .6rem;color:var(--text)}

/* STATUS */
#status{height:26px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;font-size:.75rem;color:var(--muted);gap:1rem}

/* CONTEXT MENU */
#ctx-menu{position:fixed;z-index:999;display:none;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.2rem 0;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
#ctx-menu.show{display:block}
.ctx-item{padding:.4rem .8rem;cursor:pointer;font-size:.8rem;transition:background .1s}
.ctx-item:hover{background:var(--bg3);color:var(--green)}
.ctx-item.danger:hover{background:rgba(255,85,85,.15);color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:.2rem 0}
</style>
</head>
<body>

<div id="toolbar">
  <select id="sel-board">
    <option value="uno">Arduino Uno</option>
    <option value="esp32">ESP32 DevKit</option>
  </select>
  <div class="tbtn-sep"></div>
  <button id="btn-zoom-in" title="Zoom +">+ Amplia</button>
  <span style="font-size:.75rem;color:var(--muted);min-width:40px;text-align:center" id="zoom-pct">100%</span>
  <button id="btn-zoom-out" title="Zoom -">− Redueix</button>
  <div class="tbtn-sep"></div>
  <span style="font-size:.75rem;color:var(--muted);">Cable:</span>
  <div id="wire-colors" style="display:flex;gap:4px">
    <div class="wc-dot active" data-color="#e53935" style="background:#e53935" title="Vermell"></div>
    <div class="wc-dot" data-color="#212121" style="background:#555" title="Negre"></div>
    <div class="wc-dot" data-color="#1e88e5" style="background:#1e88e5" title="Blau"></div>
    <div class="wc-dot" data-color="#fdd835" style="background:#fdd835" title="Groc"></div>
    <div class="wc-dot" data-color="#43a047" style="background:#43a047" title="Verd"></div>
    <div class="wc-dot" data-color="#fb8c00" style="background:#fb8c00" title="Taronja"></div>
  </div>

  <button id="btn-delete" title="Eliminar (Supr)">✕</button>

</div>

<div id="app">
  <aside id="palette"></aside>
  <div id="canvas-wrap">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs id="defs"></defs>
      <g id="world">
        <g id="boards"></g>
        <g id="components"></g>

      </g>
    </svg>
  </div>
  <aside id="props"><div id="props-hdr"><span>Propietats</span><button onclick="closeProps()">✕</button></div><div id="props-body"></div></aside>
</div>

<div id="status">

  <span id="sb-info"></span>
  <span style="margin-left:auto;font-size:.7rem;">Del=eliminar · Esc=cancel·lar</span>
</div>

<div id="ctx-menu">

</div>

<script>
const NS='http://www.w3.org/2000/svg';
function s(tag,attrs={},ch=[]){const el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));ch.forEach(c=>el.appendChild(c));return el}

// ════ DEFS ════
function setupDefs(){
  const d=document.getElementById('defs');
  [['red','#ff5252','#b71c1c'],['green','#69f0ae','#1b5e20'],['blue','#448aff','#0d47a1'],['yellow','#ffff00','#f57f17']].forEach(([n,l,d])=>{
    const g=s('radialGradient',{id:`led-${n}`,cx:'35%',cy:'30%',r:'60%'},[s('stop',{'offset':'0%','stop-color':l}),s('stop',{'offset':'100%','stop-color':d})]);
    document.getElementById('defs').appendChild(g);
  });
  const pcb=s('linearGradient',{id:'pcb-uno',x2:'0',y2:'1'},[s('stop',{'offset':'0%','stop-color':'#2e7d32'}),s('stop',{'offset':'100%','stop-color':'#1b5e20'})]);
  document.getElementById('defs').appendChild(pcb);
  const esp=s('linearGradient',{id:'pcb-esp',x2:'0',y2:'1'},[s('stop',{'offset':'0%','stop-color':'#1a237e'}),s('stop',{'offset':'100%','stop-color':'#0d1545'})]);
  document.getElementById('defs').appendChild(esp);
  const bb=s('linearGradient',{id:'bb',x2:'0',y2:'1'},[s('stop',{'offset':'0%','stop-color':'#e8dcc8'}),s('stop',{'offset':'100%','stop-color':'#d4c5a9'})]);
  document.getElementById('defs').appendChild(bb);
}

// ════ COMPONENTS ════
const COMPS={
  'led-red':{icon:'🔴',label:'LED Vermell',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-red)',stroke:'#8b0000','stroke-width':'1.5'},[])}},
  'led-green':{icon:'🟢',label:'LED Verd',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){g.appendChild(s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-green)',stroke:'#0b4d00','stroke-width':'1.5'}))}},
  'led-blue':{icon:'🔵',label:'LED Blau',w:50,h:70,pins:[{id:'a',x:15,y:68},{id:'k',x:35,y:68}],render(g){g.appendChild(s('ellipse',{cx:25,cy:32,rx:16,ry:26,fill:'url(#led-blue)',stroke:'#0d2566','stroke-width':'1.5'}))}},
  'resistor':{icon:'〰️',label:'Resistència',w:80,h:30,pins:[{id:'1',x:-2,y:15},{id:'2',x:82,y:15}],render(g){g.appendChild(s('rect',{x:15,y:8,width:50,height:14,rx:2,fill:'#d4b896',stroke:'#7a6f5d','stroke-width':'1'}));for(let i=0;i<4;i++)g.appendChild(s('rect',{x:20+i*10,y:8,width:3,height:14,fill:['#e53935','#1e88e5','#f9a825','#e6e600'][i]}))}},
  'button':{icon:'⊙',label:'Botó',w:50,h:50,pins:[{id:'1',x:-2,y:12},{id:'2',x:-2,y:38},{id:'3',x:52,y:12},{id:'4',x:52,y:38}],render(g){g.appendChild(s('rect',{x:5,y:5,width:40,height:40,rx:4,fill:'#e0e0e0',stroke:'#999','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:25,cy:25,r:12,fill:'#ffd700',stroke:'#b8860b','stroke-width':'1'}))}},
  'buzzer':{icon:'🔊',label:'Buzzer',w:50,h:55,pins:[{id:'+',x:15,y:53},{id:'-',x:35,y:53}],render(g){g.appendChild(s('rect',{x:8,y:5,width:34,height:30,rx:3,fill:'#1a1a1a',stroke:'#333','stroke-width':'1.5'}));g.appendChild(s('path',{d:'M 12 8 L 38 8 Q 40 8 40 10 L 40 33 Q 40 35 38 35 L 12 35 Q 10 35 10 33 L 10 10 Q 10 8 12 8',fill:'#1a1a1a'}))}},
  'dht11':{icon:'💧',label:'DHT11',w:60,h:80,pins:[{id:'V',x:18,y:78},{id:'D',x:30,y:78},{id:'G',x:42,y:78}],render(g){g.appendChild(s('rect',{x:5,y:10,width:50,height:60,rx:3,fill:'#4a90e2',stroke:'#0d47a1','stroke-width':'1.5'}));g.appendChild(s('text',{x:30,y:35,'text-anchor':'middle','font-size':'9','font-family':'monospace','fill':'#fff','font-weight':'bold'},'DHT11'));for(let i=0;i<6;i++)g.appendChild(s('line',{x1:5+i*10,y1:45,x2:5+i*10,y2:65,stroke:'rgba(255,255,255,.3)','stroke-width':'0.5'}))}},
  'hc-sr04':{icon:'📡',label:'HC-SR04',w:100,h:55,pins:[{id:'V',x:15,y:53},{id:'T',x:35,y:53},{id:'E',x:65,y:53},{id:'G',x:85,y:53}],render(g){g.appendChild(s('rect',{x:5,y:8,width:90,height:40,rx:2,fill:'#e0e0e0',stroke:'#999','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:25,cy:20,r:8,fill:'#fff',stroke:'#999','stroke-width':'1'}));g.appendChild(s('circle',{cx:75,cy:20,r:8,fill:'#fff',stroke:'#999','stroke-width':'1'}));g.appendChild(s('text',{x:50,y:38,'text-anchor':'middle','font-size':'8','fill':'#666','font-family':'monospace'},'HC-SR04'))}},
  'pir':{icon:'🔴',label:'Sensor PIR',w:60,h:65,pins:[{id:'V',x:18,y:63},{id:'O',x:30,y:63},{id:'G',x:42,y:63}],render(g){g.appendChild(s('rect',{x:10,y:5,width:40,height:35,rx:2,fill:'#f0f0f0'}));g.appendChild(s('circle',{cx:30,cy:30,r:18,fill:'#e8e8e8',stroke:'#999','stroke-width':'1.5'}))}},
  'ldr':{icon:'☀️',label:'LDR',w:40,h:50,pins:[{id:'1',x:12,y:48},{id:'2',x:28,y:48}],render(g){g.appendChild(s('circle',{cx:20,cy:20,r:12,fill:'#ffeb3b',stroke:'#f57f17','stroke-width':'1.5'}));g.appendChild(s('line',{x1:28,y1:12,x2:34,y2:6,stroke:'#f57f17','stroke-width':'1'}));g.appendChild(s('line',{x1:28,y1:28,x2:34,y2:34,stroke:'#f57f17','stroke-width':'1'}))}},
  'pot':{icon:'🎚️',label:'Potenciòmetre',w:60,h:65,pins:[{id:'G',x:18,y:63},{id:'W',x:30,y:63},{id:'V',x:42,y:63}],render(g){g.appendChild(s('circle',{cx:30,cy:25,r:18,fill:'#8b4513',stroke:'#5a2a0a','stroke-width':'1.5'}));g.appendChild(s('line',{x1:30,y1:10,x2:30,y2:5,stroke:'#333','stroke-width':'2'})}},
  'servo':{icon:'⚙️',label:'Servo',w:80,h:70,pins:[{id:'G',x:20,y:68},{id:'S',x:40,y:68},{id:'V',x:60,y:68}],render(g){g.appendChild(s('rect',{x:10,y:10,width:60,height:50,rx:3,fill:'#8B4513',stroke:'#5a2a0a','stroke-width':'1.5'}));g.appendChild(s('circle',{cx:40,cy:20,r:8,fill:'#333',stroke:'#000','stroke-width':'1'}));g.appendChild(s('text',{x:40,y:45,'text-anchor':'middle','font-size':'8','fill':'#ddd','font-family':'monospace'},'Servo'))}},
  'motor':{icon:'⚡',label:'Motor DC',w:70,h:80,pins:[{id:'+',x:20,y:-2},{id:'-',x:50,y:-2}],render(g){g.appendChild(s('circle',{cx:35,cy:35,r:28,fill:'#ff6b6b',stroke:'#c92a2a','stroke-width':'1.5'}));g.appendChild(s('text',{x:35,y:40,'text-anchor':'middle','font-size':'9','fill':'#fff','font-weight':'bold'},'DC'))}},
  'lcd':{icon:'📺',label:'LCD 16×2',w:200,h:90,pins:[{id:'1',x:10,y:88},{id:'2',x:30,y:88},{id:'3',x:50,y:88},{id:'4',x:70,y:88},{id:'5',x:90,y:88},{id:'6',x:110,y:88},{id:'7',x:130,y:88},{id:'8',x:150,y:88},{id:'9',x:170,y:88},{id:'10',x:190,y:88}],render(g){g.appendChild(s('rect',{x:5,y:8,width:190,height:70,rx:3,fill:'#d0e8f2',stroke:'#01579b','stroke-width':'2'}));g.appendChild(s('rect',{x:15,y:18,width:170,height:40,fill:'#001d3d'}));g.appendChild(s('text',{x:100,y:38,'text-anchor':'middle','font-size':'7','fill':'#00c800','font-family':'monospace'},'AAAAAAAAAA'));g.appendChild(s('text',{x:100,y:50,'text-anchor':'middle','font-size':'7','fill':'#00c800','font-family':'monospace'},'BBBBBBBBBB'))}}
};

// ════ STATE ════
const state={
  board:'uno',
  components:[],
  wires:[],
  view:{x:0,y:0,s:1},
  selected:null,
  wireMode:false,
  wireStart:null,
  wireColor:'#e53935',
  compId:0
};

// ════ PALETTE ════
function buildPalette(){
  const p=document.getElementById('palette');
  p.innerHTML='<div class="pal-section"><div class="pal-title">Bàsics</div></div><div class="pal-section"><div class="pal-title">Sensors</div></div><div class="pal-section"><div class="pal-title">Actuadors</div></div>';
  const secs=p.querySelectorAll('.pal-section');
  const basics=['led-red','led-green','led-blue','resistor','button','buzzer'];
  const sensors=['dht11','hc-sr04','pir','ldr'];
  const actuators=['pot','servo','motor','lcd'];
  const all=[basics,sensors,actuators];

  all.forEach((items,i)=>{
    items.forEach(cid=>{
      const c=COMPS[cid];
      const item=s('div',{class:'pal-item','data-comp':cid});
      item.innerHTML=`<div class="pal-icon">${c.icon}</div><div class="pal-text"><div class="pal-label">${c.label}</div></div>`;
      item.onclick=()=>addComponent(cid);
      secs[i].appendChild(item);
    });
  });
}

function addComponent(cid){
  const c=COMPS[cid];
  const center=canvasCenter();
  const comp={id:state.compId++,type:cid,x:center.x,y:center.y,pins:{}};
  state.components.push(comp);
  renderAll();
  select(comp.id);
}

function canvasCenter(){
  const r=document.getElementById('canvas').getBoundingClientRect();
  return{x:(r.width/2-state.view.x)/state.view.s,y:(r.height/2-state.view.y)/state.view.s};
}

// ════ RENDERING ════
function renderAll(){
  renderBoards();
  renderComponents();
  renderWires();
}

function renderBoards(){
  const g=document.getElementById('boards');
  g.innerHTML='';
  if(state.board==='uno'){
    const board=s('g',{id:'board-0',class:'comp-group',transform:'translate(80,60)scale(0.7)'});
    // Arduino PCB
    board.appendChild(s('rect',{x:0,y:10,width:360,height:220,rx:10,fill:'url(#pcb-uno)',stroke:'#1a4d1e','stroke-width':2}));
    // USB
    board.appendChild(s('rect',{x:0,y:80,width:28,height:40,rx:2,fill:'#777'}));
    // Reset button
    board.appendChild(s('rect',{x:305,y:60,width:20,height:20,rx:3,fill:'#e53935'}));
    // Chip
    board.appendChild(s('rect',{x:140,y:80,width:80,height:60,rx:3,fill:'#1a1a1a'}));
    board.appendChild(s('text',{x:180,y:115,'text-anchor':'middle','font-size':8,'fill':'#666','font-family':'monospace'},'ATmega328P'));
    // Pin headers
    const pins=['D0','D1','D2','D3','D4','D5','D6','D7','D8','D9','D10','D11','D12','D13','AREF','GND'];
    pins.forEach((p,i)=>{
      const x=50+i*18;
      board.appendChild(s('circle',{cx:x,cy:0,r:6,class:'pin-circle','data-pin':p}));
      board.appendChild(s('text',{x:x,y:24,'text-anchor':'middle','font-size':5.5,'fill':'#a5d6a7','font-family':'monospace'},p)));
    });
    const apins=['3V3','5V','GND','GND','VIN','A0','A1','A2','A3','A4','A5'];
    apins.forEach((p,i)=>{
      const x=50+i*18;
      board.appendChild(s('circle',{cx:x,cy:240,r:6,class:'pin-circle','data-pin':p}));
      board.appendChild(s('text',{x:x,y:256,'text-anchor':'middle','font-size':5.5,'fill':'#a5d6a7','font-family':'monospace'},p)));
    });
    g.appendChild(board);
  }
}

function renderComponents(){
  const g=document.getElementById('components');
  g.innerHTML='';
  state.components.forEach(c=>{
    const def=COMPS[c.type];
    const cg=s('g',{id:`comp-${c.id}`,class:'comp-group',transform:`translate(${c.x},${c.y})`,style:'cursor:grab'});
    cg.dataset.id=c.id;
    cg.dataset.type=c.type;
    if(state.selected===c.id)cg.classList.add('selected');

    // Body
    def.render(cg);

    // Selection rect
    cg.appendChild(s('rect',{class:'comp-rect',x:-5,y:-5,width:def.w+10,height:def.h+10,rx:4}));

    // Pins
    def.pins.forEach(p=>{
      const pc=s('circle',{cx:p.x,cy:p.y,r:5,class:'pin-circle','data-pin':p.id});
      cg.appendChild(pc);
    });

    g.appendChild(cg);
  });
}

function renderWires(){
  const g=document.getElementById('wires');
  g.innerHTML='';
  state.wires.forEach(w=>{
    const f=w.from, t=w.to;
    const d=wireD(f.x,f.y,t.x,t.y);
    const path=s('path',{d,class:'wire',stroke:w.color,'data-id':w.id});
    path.onclick=e=>{e.stopPropagation();select(-w.id)};
    g.appendChild(path);
  });
}

function wireD(x1,y1,x2,y2){
  const dx=Math.abs(x2-x1),dy=Math.abs(y2-y1);
  if(dx>dy){const h=(x1+x2)/2;return`M ${x1} ${y1} C ${h} ${y1}, ${h} ${y2}, ${x2} ${y2}`;}
  else{const h=(y1+y2)/2;return`M ${x1} ${y1} C ${x1} ${h}, ${x2} ${h}, ${x2} ${y2}`;}
}

// ════ INTERACTION ════
const canvas=document.getElementById('canvas');
let panStart,compDragStart;

canvas.addEventListener('mousedown',e=>{
  if(e.button===2)return;
  const pt=getCanvasCoords(e);
  const target=document.elementFromPoint(e.clientX,e.clientY);

  if(target.classList.contains('pin-circle')){
    if(state.wireMode){
      completeWire(target);
    }else{
      state.wireMode=true;
      state.wireStart={x:pt.x,y:pt.y,comp:target.closest('.comp-group'),pin:target.dataset.pin};
      updateStatus('Selecciona pin destí');
      document.getElementById('canvas').classList.add('wire-mode');
    }
    return;
  }

  const comp=target.closest('.comp-group');
  if(comp){
    select(+comp.dataset.id);
    compDragStart={x:+comp.dataset.x||0,y:+comp.dataset.y||0,sx:pt.x,sy:pt.y,comp};
    return;
  }

  panStart=pt;
  canvas.classList.add('panning');
});

canvas.addEventListener('mousemove',e=>{
  if(state.wireMode&&state.wireStart){
    const pt=getCanvasCoords(e);
    const g=document.getElementById('wire-preview');
    g.innerHTML='';
    const d=wireD(state.wireStart.x,state.wireStart.y,pt.x,pt.y);
    g.appendChild(s('path',{d,stroke:state.wireColor,'stroke-width':'2.5'}));
  }

  if(compDragStart){
    const pt=getCanvasCoords(e);
    const dx=pt.x-compDragStart.sx,dy=pt.y-compDragStart.sy;
    const comp=state.components.find(c=>c.id===+compDragStart.comp.dataset.id);
    if(comp){comp.x+=dx;comp.y+=dy}
    compDragStart.sx=pt.x;compDragStart.sy=pt.y;
    renderAll();
  }

  if(panStart){
    const pt=getCanvasCoords(e,true);
    state.view.x+=e.clientX-panStart.clientX;
    state.view.y+=e.clientY-panStart.clientY;
    updateTransform();
    panStart={clientX:e.clientX,clientY:e.clientY};
  }
});

canvas.addEventListener('mouseup',()=>{
  panStart=null;compDragStart=null;
  canvas.classList.remove('panning');
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const dir=e.deltaY>0?0.9:1.1;
  state.view.s*=dir;
  updateTransform();
  updateZoom();
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const target=document.elementFromPoint(e.clientX,e.clientY);
  if(target.closest('.comp-group')){
    const menu=document.getElementById('ctx-menu');
    menu.style.left=e.clientX+'px';
    menu.style.top=e.clientY+'px';
    menu.classList.add('show');
  }
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#ctx-menu'))document.getElementById('ctx-menu').classList.remove('show');
  if(e.target.closest('#canvas'))select(null);
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){state.wireMode=false;document.getElementById('wire-preview').innerHTML='';document.getElementById('canvas').classList.remove('wire-mode');updateStatus('Simulador de circuits');}
  if(e.key==='Delete')deleteSelected();
});

// ════ HELPERS ════
function getCanvasCoords(e,raw){
  const r=document.getElementById('canvas').getBoundingClientRect();
  const sx=(e.clientX-r.left-state.view.x)/state.view.s;
  const sy=(e.clientY-r.top-state.view.y)/state.view.s;
  return raw?{clientX:e.clientX,clientY:e.clientY}:{x:sx,y:sy};
}

function updateTransform(){
  document.getElementById('world').setAttribute('transform',`translate(${state.view.x},${state.view.y})scale(${state.view.s})`);
}

function updateZoom(){
  document.getElementById('zoom-pct').textContent=Math.round(state.view.s*100)+'%';
}

function updateStatus(text){
  document.getElementById('sb-mode').textContent='Mode: '+text;
}

function select(id){
  state.selected=id;
  document.querySelectorAll('.comp-group').forEach(e=>e.classList.remove('selected'));
  if(id!==null&&id>0){
    const comp=state.components.find(c=>c.id===id);
    if(comp)document.getElementById(`comp-${id}`).classList.add('selected');
  }
  renderAll();
}

function completeWire(target){
  const comp=target.closest('.comp-group');
  if(comp.dataset.id===state.wireStart.comp.dataset.id)return;
  const from=getPinWorldCoords(state.wireStart.comp,state.wireStart.pin);
  const to=getPinWorldCoords(comp,target.dataset.pin);
  state.wires.push({id:state.wires.length,from,to,color:state.wireColor});
  state.wireMode=false;
  document.getElementById('wire-preview').innerHTML='';
  document.getElementById('canvas').classList.remove('wire-mode');
  updateStatus('Simulador de circuits');
  renderWires();
}

function getPinWorldCoords(comp,pin){
  const rect=comp.getBoundingClientRect();
  const cg=document.getElementById('canvas').getBoundingClientRect();
  const x=(rect.left-cg.left-state.view.x)/state.view.s+comp.dataset.x||0;
  const y=(rect.top-cg.top-state.view.y)/state.view.s+comp.dataset.y||0;
  return{x,y,comp:+comp.dataset.id,pin};
}

function deleteSelected(){
  if(state.selected>0){
    state.components=state.components.filter(c=>c.id!==state.selected);
    state.wires=state.wires.filter(w=>!(w.from.comp===state.selected||w.to.comp===state.selected));
    state.selected=null;
    renderAll();
  }else if(state.selected<0){
    state.wires=state.wires.filter(w=>w.id!==-state.selected);
    state.selected=null;
    renderWires();
  }
}

function showProps(){
  document.getElementById('ctx-menu').classList.remove('show');
  if(state.selected>0){
    const comp=state.components.find(c=>c.id===state.selected);
    const def=COMPS[comp.type];
    document.getElementById('props').classList.add('open');
    document.getElementById('props-body').innerHTML=`<div class="prop-row"><div class="prop-label">Tipus</div><div class="prop-val">${def.label}</div></div><div class="prop-row"><div class="prop-label">Posició</div><div class="prop-val">X: ${Math.round(comp.x)} Y: ${Math.round(comp.y)}</div></div>`;
  }
}

function closeProps(){
  document.getElementById('props').classList.remove('open');
}

// ════ INIT ════
setupDefs();
buildPalette();

document.getElementById('btn-zoom-in').onclick=()=>{state.view.s*=1.2;updateTransform();updateZoom()};
document.getElementById('btn-zoom-out').onclick=()=>{state.view.s/=1.2;updateTransform();updateZoom()};
document.getElementById('btn-delete').onclick=deleteSelected;
document.getElementById('btn-clear').onclick=()=>{if(confirm('Netejar tot el circuit?')){state.components=[];state.wires=[];state.selected=null;renderAll()}};

document.getElementById('sel-board').onchange=e=>{state.board=e.target.value;renderBoards()};

document.getElementById('wire-colors').querySelectorAll('.wc-dot').forEach(d=>{
  d.onclick=()=>{
    document.querySelectorAll('.wc-dot').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
    state.wireColor=d.dataset.color;
  };
});

updateTransform();
updateZoom();
updateStatus('Simulador de circuits');
renderAll();
</script>
</body>
</html>
