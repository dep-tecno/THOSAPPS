.pin-circle{fill:transparent;stroke:transparent;cursor:crosshair}
.pin-circle:hover+.pin-dot{fill:#00e676;stroke:#fff;stroke-width:2}
.pin-circle.wiring+.pin-dot{fill:#ffd54f;stroke:var(--green);stroke-width:2.5}
.pin-circle.hover-pin+.pin-dot{fill:#00e676;stroke:#fff;stroke-width:2}
.comp-group.selected>.comp-rect,.board-group.selected>.comp-rect{display:block}
.comp-rect{display:none;fill:none;stroke:var(--green);stroke-width:1.5;stroke-dasharray:5 3;pointer-events:none}
.wire{fill:none;stroke-width:3.5;stroke-linecap:round;cursor:context-menu;filter:drop-shadow(0 2px 2px rgba(0,0,0,.6));transition:stroke-width .15s,opacity .15s}
.wire:hover{stroke-width:5;opacity:.75}
#btn-mode{font-size:.82rem;min-width:90px;transition:all .2s}
#btn-mode.cable-on{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.12);font-weight:600}

#props-hdr{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:.8rem;color:var(--green)}

<script>
const NS='http://www.w3.org/2000/svg';

function s(t,a={},c=[]){
  const e=document.createElementNS(NS,t);
  Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));
  if(typeof c==='string')e.textContent=c;
  else c.forEach(x=>{if(typeof x==='string')e.textContent=x;else e.appendChild(x)});
  return e;
}

function setupDefs(){
  const d=document.getElementById('defs');

  // LED gradients amb halo brillant
  [['red','#ff8080','#ff1a1a','#7a0000'],['green','#a5ffce','#00d96b','#003d1a'],['blue','#80b3ff','#1a66ff','#001a4d'],['yellow','#fff59d','#ffeb3b','#827717'],['white','#ffffff','#f5f5f5','#9e9e9e']].forEach(([n,light,mid,dk])=>{
    d.appendChild(s('radialGradient',{id:`led-${n}`,cx:'35%',cy:'30%',r:'65%'},[
      s('stop',{'offset':'0%','stop-color':light,'stop-opacity':'1'}),
      s('stop',{'offset':'40%','stop-color':mid,'stop-opacity':'1'}),
      s('stop',{'offset':'100%','stop-color':dk,'stop-opacity':'1'})
    ]));
    d.appendChild(s('radialGradient',{id:`led-glow-${n}`,cx:'50%',cy:'50%',r:'50%'},[
      s('stop',{'offset':'0%','stop-color':mid,'stop-opacity':'0.6'}),
      s('stop',{'offset':'100%','stop-color':mid,'stop-opacity':'0'})
    ]));
  });

  // Drop shadow per components
  d.appendChild(s('filter',{id:'shadow',x:'-50%',y:'-50%',width:'200%',height:'200%'},[
    s('feDropShadow',{dx:2,dy:3,stdDeviation:2.5,'flood-opacity':'0.45','flood-color':'#000'})
  ]));

  // Shadow més suau per cables
  d.appendChild(s('filter',{id:'wire-shadow',x:'-20%',y:'-20%',width:'140%',height:'140%'},[
    s('feDropShadow',{dx:1,dy:1.5,stdDeviation:1,'flood-opacity':'0.5','flood-color':'#000'})
  ]));

  // Glow filter per LEDs encesos
  d.appendChild(s('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'},[
    s('feGaussianBlur',{stdDeviation:'2.5',result:'blur'}),
    s('feMerge',{},[
      s('feMergeNode',{in:'blur'}),
      s('feMergeNode',{in:'SourceGraphic'})
    ])
  ]));

  // PCB verd Arduino
  d.appendChild(s('linearGradient',{id:'pcb',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#1e8449'}),
    s('stop',{'offset':'50%','stop-color':'#27ae60'}),
    s('stop',{'offset':'100%','stop-color':'#196f3d'})
  ]));

  // PCB blau ESP
  d.appendChild(s('linearGradient',{id:'pcb-blue',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#1f3a93'}),
    s('stop',{'offset':'100%','stop-color':'#0f2657'})
  ]));

  // Metall daurat
  d.appendChild(s('linearGradient',{id:'metal',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#fff8dc'}),
    s('stop',{'offset':'50%','stop-color':'#ffd700'}),
    s('stop',{'offset':'100%','stop-color':'#b8860b'})
  ]));

  // Metall plata (per pins, terminals)
  d.appendChild(s('linearGradient',{id:'silver',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#f5f5f5'}),
    s('stop',{'offset':'50%','stop-color':'#bdbdbd'}),
    s('stop',{'offset':'100%','stop-color':'#616161'})
  ]));

  // Pin metal·lic (radial per pins de connexió)
  d.appendChild(s('radialGradient',{id:'pin-metal',cx:'35%',cy:'30%',r:'70%'},[
    s('stop',{'offset':'0%','stop-color':'#ffec99'}),
    s('stop',{'offset':'50%','stop-color':'#fcc419'}),
    s('stop',{'offset':'100%','stop-color':'#8b6914'})
  ]));

  // Cos resistència ceràmica
  d.appendChild(s('linearGradient',{id:'resistor-body',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#e8c89c'}),
    s('stop',{'offset':'50%','stop-color':'#d4a574'}),
    s('stop',{'offset':'100%','stop-color':'#a87d50'})
  ]));

  // Plastic negre (buzzer, IC)
  d.appendChild(s('linearGradient',{id:'black-plastic',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#3a3a3a'}),
    s('stop',{'offset':'50%','stop-color':'#1a1a1a'}),
    s('stop',{'offset':'100%','stop-color':'#0a0a0a'})
  ]));

  // Pantalla LCD verda
  d.appendChild(s('linearGradient',{id:'lcd-screen',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#7cb342'}),
    s('stop',{'offset':'100%','stop-color':'#558b2f'})
  ]));

  // Servo blau plàstic
  d.appendChild(s('linearGradient',{id:'servo-body',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'#5c6bc0'}),
    s('stop',{'offset':'100%','stop-color':'#283593'})
  ]));

  // Cable amb gradient per simular volum
  d.appendChild(s('linearGradient',{id:'wire-vol',x1:'0',y1:'0',x2:'0',y2:'1'},[
    s('stop',{'offset':'0%','stop-color':'rgba(255,255,255,0.3)'}),
    s('stop',{'offset':'50%','stop-color':'rgba(0,0,0,0)'}),
    s('stop',{'offset':'100%','stop-color':'rgba(0,0,0,0.3)'})
  ]));
}

const COMPS={

    g.appendChild(s('path',{d:'M 8 48 Q 8 52, 14 52 L 36 52 Q 42 52, 42 48 L 42 44 L 8 44 Z',fill:'#5d4037',stroke:'#3e2723','stroke-width':'0.8'}));

    g.appendChild(s('circle',{cx:25,cy:25,r:24,fill:'url(#led-glow-blue)'}));
    g.appendChild(s('line',{x1:14,y1:50,x2:14,y2:78,stroke:'url(#silver)','stroke-width':'3','stroke-linecap':'round'}));
    g.appendChild(s('line',{x1:36,y1:50,x2:36,y2:78,stroke:'url(#silver)','stroke-width':'2.5','stroke-linecap':'round'}));
    g.appendChild(s('path',{d:'M 8 48 Q 8 52, 14 52 L 36 52 Q 42 52, 42 48 L 42 44 L 8 44 Z',fill:'#5d4037',stroke:'#3e2723','stroke-width':'0.8'}));
    g.appendChild(s('ellipse',{cx:25,cy:25,rx:17,ry:20,fill:'url(#led-blue)',stroke:'#001a4d','stroke-width':'1.5',filter:'url(#shadow)'}));
    g.appendChild(s('path',{d:'M 14 12 Q 18 8, 24 10 Q 22 16, 16 18 Z',fill:'rgba(255,255,255,.7)'}));
    g.appendChild(s('ellipse',{cx:25,cy:42,rx:13,ry:3,fill:'rgba(255,255,255,.15)'}));
  }},
  'resistor':{icon:'〰️',label:'Resistència',w:90,h:30,pins:[{id:'1',x:0,y:15},{id:'2',x:90,y:15}],render(g){
    g.appendChild(s('line',{x1:0,y1:15,x2:18,y2:15,stroke:'url(#silver)','stroke-width':'3','stroke-linecap':'round'}));
    g.appendChild(s('line',{x1:72,y1:15,x2:90,y2:15,stroke:'url(#silver)','stroke-width':'3','stroke-linecap':'round'}));
    g.appendChild(s('path',{d:'M 18 15 Q 18 4, 28 4 L 62 4 Q 72 4, 72 15 Q 72 26, 62 26 L 28 26 Q 18 26, 18 15 Z',fill:'url(#resistor-body)',stroke:'#7a5530','stroke-width':'1.2',filter:'url(#shadow)'}));
    [['#5d4037',26],['#e53935',32],['#000000',38],['#fdd835',46],['#a87d50',56]].forEach(([c,x])=>{
      g.appendChild(s('rect',{x,y:5,width:3,height:20,fill:c,opacity:'0.95'}));
    });
    g.appendChild(s('path',{d:'M 18 7 Q 28 5, 72 7',fill:'none',stroke:'rgba(255,255,255,0.4)','stroke-width':'1.5'}));
  }},
  'button':{icon:'⊙',label:'Botó',w:60,h:60,pins:[{id:'1',x:5,y:12},{id:'2',x:5,y:48},{id:'3',x:55,y:12},{id:'4',x:55,y:48}],render(g){

    g.appendChild(s('line',{x1:55,y1:12,x2:49,y2:18,stroke:'url(#silver)','stroke-width':'2'}));

    g.appendChild(s('text',{x:28,y:43,'text-anchor':'middle','font-size':'5','fill':'#ff3333','font-weight':'bold'},'+'));

    g.appendChild(s('ellipse',{cx:24,cy:14,rx:8,ry:4,fill:'rgba(255,255,255,0.12)'}));

  'dht11':{icon:'💧',label:'DHT11',w:64,h:88,pins:[{id:'V',x:18,y:86},{id:'D',x:32,y:86},{id:'G',x:46,y:86}],render(g){

}

function addBoard(type){
  const r=document.getElementById('canvas').getBoundingClientRect();
  const x=(r.width/2-state.view.x)/state.view.s - BOARDS[type].w/2;
  const y=(r.height/2-state.view.y)/state.view.s - BOARDS[type].h/2;
  state.boards.push({id:state.boardId++,type,x,y});
  renderAll();
}

function addComponent(cid){
  const c=COMPS[cid];
  const r=document.getElementById('canvas').getBoundingClientRect();
  const x=(r.width/2-state.view.x)/state.view.s;
  const y=(r.height/2-state.view.y)/state.view.s;
  const comp={id:state.compId++,type:cid,x,y};
  state.components.push(comp);
  renderAll();
  select(comp.id);
}

function renderAll(){
  renderBoards();
  renderComponents();
  renderWires();
}

// --- Pin helpers ---
function getPinInfo(el){
  const cg=el.closest('.comp-group');
  if(cg)return{kind:'comp',id:+cg.dataset.id,pin:el.dataset.pin};
  const bg=el.closest('.board-group');
  if(bg)return{kind:'board',id:+bg.dataset.boardId,pin:el.dataset.pin};
  return null;
}
function getPinPos(ep){
  if(ep.kind==='comp'){
    const c=state.components.find(c=>c.id===ep.id);
    if(!c)return null;
    const p=COMPS[c.type].pins.find(p=>p.id===ep.pin);
    return p?{x:c.x+p.x,y:c.y+p.y}:null;
  }
  const b=state.boards.find(b=>b.id===ep.id);
  if(!b)return null;
  // Protoboard: decode pin ID (e.g. 'U5_3' or 'L12_0')
  if(b.type==='proto830'||b.type==='proto400'){
    const m=ep.pin.match(/^([UL])(\d+)_(\d+)$/);
    if(!m)return null;
    const isU=m[1]==='U',col=+m[2],row=+m[3];
    if(b.type==='proto830') return{x:b.x+20+col*8, y:b.y+(isU?35+row*8:105+row*8)};
    return{x:b.x+16+col*7, y:b.y+(isU?28+row*7:78+row*7)};
  }
  const pins=BOARDS[b.type].pins;
  if(!pins)return null;
  const p=pins.find(p=>p.id===ep.pin);
  return p?{x:b.x+p.x,y:b.y+p.y}:null;
}
function multiPath(pts){
  if(pts.length<2)return'';
  let d=`M ${pts[0].x} ${pts[0].y}`;
  for(let i=1;i<pts.length;i++)d+=` L ${pts[i].x} ${pts[i].y}`;
  return d;
}
function drawWire(g,pts,color,wid){
  const d=multiPath(pts);
  g.appendChild(s('path',{d,fill:'none',stroke:'rgba(0,0,0,0.38)','stroke-width':'5.5','stroke-linecap':'round','stroke-linejoin':'round',transform:'translate(1.5,2.5)','pointer-events':'none'}));
  const mp=s('path',{d,fill:'none',stroke:color,'stroke-width':'3.5','stroke-linecap':'round','stroke-linejoin':'round',class:'wire'});
  if(wid!==undefined)mp.dataset.wireId=wid;
  g.appendChild(mp);
  g.appendChild(s('path',{d,fill:'none',stroke:'rgba(255,255,255,0.28)','stroke-width':'1.2','stroke-linecap':'round','stroke-linejoin':'round','pointer-events':'none'}));
  [[pts[0].x,pts[0].y],[pts[pts.length-1].x,pts[pts.length-1].y]].forEach(([cx,cy])=>{
    g.appendChild(s('circle',{cx,cy,r:5.5,fill:color,stroke:'rgba(0,0,0,0.55)','stroke-width':'1.5','pointer-events':'none'}));
    g.appendChild(s('circle',{cx,cy,r:2.5,fill:'rgba(255,255,255,0.35)','pointer-events':'none'}));
  });
}

// --- Render ---
function renderBoards(){
  const g=document.getElementById('boards');
  g.innerHTML='';
  state.boards.forEach(b=>{
    const d=BOARDS[b.type];
    const bg=s('g',{id:`board-${b.id}`,class:'board-group',transform:`translate(${b.x},${b.y})`,style:'cursor:grab'});
    bg.dataset.boardId=b.id;
    d.render(bg);
    bg.appendChild(s('rect',{class:'comp-rect',x:-5,y:-5,width:d.w+10,height:d.h+10,rx:4}));
    if(d.pins)d.pins.forEach(p=>{
      bg.appendChild(s('circle',{cx:p.x,cy:p.y,r:8,class:'pin-circle','data-pin':p.id}));
      bg.appendChild(s('circle',{cx:p.x,cy:p.y,r:3,class:'pin-dot','data-pin':p.id}));
    });
    g.appendChild(bg);
  });
}

function renderComponents(){
  const g=document.getElementById('components');
  g.innerHTML='';
  state.components.forEach(c=>{
    const d=COMPS[c.type];
    const cg=s('g',{id:`comp-${c.id}`,class:'comp-group',transform:`translate(${c.x},${c.y})`,style:'cursor:grab'});
    cg.dataset.id=c.id;
    if(state.selected===c.id)cg.classList.add('selected');
    d.render(cg);
    cg.appendChild(s('rect',{class:'comp-rect',x:-5,y:-5,width:d.w+10,height:d.h+10,rx:4}));
    d.pins.forEach(p=>{
      cg.appendChild(s('circle',{cx:p.x,cy:p.y,r:8,class:'pin-circle','data-pin':p.id}));
      cg.appendChild(s('circle',{cx:p.x,cy:p.y,r:3,class:'pin-dot','data-pin':p.id}));
    });
    g.appendChild(cg);
  });
}

function renderWires(){
  const g=document.getElementById('wires');
  g.innerHTML='';
  state.wires.forEach(w=>{
    const p1=getPinPos(w.from),p2=getPinPos(w.to);
    if(p1&&p2)drawWire(g,[p1,...(w.points||[]),p2],w.color,w.id);
  });
}

// --- Wire preview ---
const preview=document.getElementById('wire-preview');
function cancelWire(){
  state.wireMode=false;state.wireStart=null;state.wirePoints=[];
  preview.setAttribute('d','');
  document.getElementById('wire-preview-pts').innerHTML='';
  document.querySelectorAll('.pin-circle.wiring').forEach(p=>p.classList.remove('wiring'));
  document.body.style.cursor='';
}
function updatePreview(mx,my){
  if(!state.wireMode||!state.wireStart)return;
  const p1=getPinPos(state.wireStart);
  if(!p1)return;
  const pts=[p1,...state.wirePoints,{x:mx,y:my}];
  preview.setAttribute('d',multiPath(pts));
  preview.setAttribute('stroke',state.wireColor);
  const gp=document.getElementById('wire-preview-pts');
  gp.innerHTML='';
  state.wirePoints.forEach(p=>{
    gp.appendChild(s('circle',{cx:p.x,cy:p.y,r:4.5,fill:state.wireColor,stroke:'rgba(255,255,255,0.6)','stroke-width':'1.5'}));
    gp.appendChild(s('circle',{cx:p.x,cy:p.y,r:2,fill:'rgba(255,255,255,0.5)'}));
  });
}

// --- Mode toggle ---
function setMode(m){
  state.mode=m;
  cancelWire();
  const btn=document.getElementById('btn-mode');
  const wrap=document.getElementById('canvas-wrap');
  if(m==='wire'){
    btn.textContent='🔗 Cable';btn.classList.add('cable-on');
    wrap.classList.add('cable-mode');wrap.classList.remove('move-mode');
  } else {
    btn.textContent='✋ Moure';btn.classList.remove('cable-on');
    wrap.classList.add('move-mode');wrap.classList.remove('cable-mode');
  }
}

// --- Canvas events ---
const canvas=document.getElementById('canvas');
let panStart,dragComp;

canvas.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left-state.view.x)/state.view.s;
  const y=(e.clientY-r.top-state.view.y)/state.view.s;
  const t=document.elementFromPoint(e.clientX,e.clientY);
  if(!t)return;

  // ── PINS: always wire-interactive in any mode ──
  if(t.classList.contains('pin-circle')){
    e.preventDefault();
    const info=getPinInfo(t);
    if(!info)return;
    if(state.wireMode&&state.wireStart){
      const s0=state.wireStart;
      if(!(info.kind===s0.kind&&info.id===s0.id&&info.pin===s0.pin)){
        state.wires.push({id:state.wireId++,color:state.wireColor,from:s0,to:info,points:[...state.wirePoints]});
        renderWires();
      }
      cancelWire();
    } else {
      state.wireMode=true;state.wireStart=info;state.wirePoints=[];
      document.querySelectorAll('.pin-circle.wiring').forEach(p=>p.classList.remove('wiring'));
      t.classList.add('wiring');
      updatePreview(x,y);
    }
    return;
  }

  // ── Right-click during wiring: undo last waypoint or cancel ──
  if(e.button===2&&state.wireMode){
    e.preventDefault();
    if(state.wirePoints.length>0){state.wirePoints.pop();updatePreview(x,y);}
    else cancelWire();
    return;
  }

  // ── Left-click on canvas during wiring: add waypoint ──
  if(state.wireMode){
    if(e.button===0){state.wirePoints.push({x,y});updatePreview(x,y);}
    return;
  }

  // ── CABLE MODE: no dragging ──
  if(state.mode==='wire')return;

  // ── MOVE MODE: drag or pan ──
  const c=t.closest('.comp-group');
  if(c){select(+c.dataset.id);dragComp={id:+c.dataset.id,isBoard:false,sx:x,sy:y};return;}
  const b=t.closest('.board-group');
  if(b){dragComp={id:+b.dataset.boardId,isBoard:true,sx:x,sy:y};return;}
  panStart={sx:e.clientX,sy:e.clientY};
});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left-state.view.x)/state.view.s;
  const y=(e.clientY-r.top-state.view.y)/state.view.s;
  const t=document.elementFromPoint(e.clientX,e.clientY);

  // Pin tooltip (always)
  const tip=document.getElementById('pin-tip');
  if(t&&t.classList.contains('pin-circle')&&t.dataset.pin){
    tip.textContent=t.dataset.pin;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-28)+'px';
  } else { tip.style.display='none'; }

  // Wire preview (active whenever wireMode, regardless of mode button)
  if(state.wireMode){
    updatePreview(x,y);
    document.querySelectorAll('.pin-circle.hover-pin').forEach(p=>p.classList.remove('hover-pin'));
    if(t&&t.classList.contains('pin-circle'))t.classList.add('hover-pin');
    return;
  }

  if(dragComp){
    if(dragComp.isBoard){
      const b=state.boards.find(b=>b.id===dragComp.id);
      if(b){b.x+=x-dragComp.sx;b.y+=y-dragComp.sy;dragComp.sx=x;dragComp.sy=y;renderAll();}
    } else {
      const c=state.components.find(c=>c.id===dragComp.id);
      if(c){c.x+=x-dragComp.sx;c.y+=y-dragComp.sy;dragComp.sx=x;dragComp.sy=y;renderAll();}
    }
  }
  if(panStart){state.view.x+=e.clientX-panStart.sx;state.view.y+=e.clientY-panStart.sy;updateView();panStart={sx:e.clientX,sy:e.clientY};}
});

canvas.addEventListener('mouseup',()=>{panStart=null;dragComp=null;});
canvas.addEventListener('mouseleave',()=>{document.getElementById('pin-tip').style.display='none';});

// Right-click on wire → context menu to delete
const wireCtx=document.getElementById('wire-ctx');
function hideWireCtx(){wireCtx.style.display='none';}
canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(state.wireMode)return;
  hideWireCtx();
  const t=document.elementFromPoint(e.clientX,e.clientY);
  if(!t||!t.classList.contains('wire')||t.dataset.wireId===undefined)return;
  const wid=+t.dataset.wireId;
  wireCtx.innerHTML='';
  const lbl=document.createElement('div');
  lbl.style.cssText='padding:4px 12px;font-size:.65rem;color:var(--muted);border-bottom:1px solid var(--border)';
  lbl.textContent='Cable';
  wireCtx.appendChild(lbl);
  const btn=document.createElement('div');
  btn.style.cssText='padding:6px 14px;font-size:.78rem;cursor:pointer;color:var(--red)';
  btn.textContent='✕ Esborrar cable';
  btn.onmouseenter=()=>btn.style.background='rgba(255,85,85,.12)';
  btn.onmouseleave=()=>btn.style.background='';
  btn.onclick=()=>{state.wires=state.wires.filter(w=>w.id!==wid);renderWires();hideWireCtx();};
  wireCtx.appendChild(btn);
  wireCtx.style.display='block';
  wireCtx.style.left=e.clientX+'px';
  wireCtx.style.top=e.clientY+'px';
});
document.addEventListener('mousedown',e=>{if(!wireCtx.contains(e.target))hideWireCtx();});
canvas.addEventListener('wheel',e=>{e.preventDefault();state.view.s*=e.deltaY>0?0.9:1.1;updateView();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(state.wireMode)cancelWire();else if(state.mode==='wire')setMode('move');}
  if(e.key==='w'||e.key==='W'){setMode(state.mode==='move'?'wire':'move');}
});

document.getElementById('btn-mode').onclick=()=>setMode(state.mode==='move'?'wire':'move');
document.getElementById('btn-zoom-in').onclick=()=>{state.view.s*=1.2;updateView();};
document.getElementById('btn-zoom-out').onclick=()=>{state.view.s/=1.2;updateView();};
document.getElementById('btn-delete').onclick=()=>{
  if(state.selected!==null){
    const id=state.selected;
    state.wires=state.wires.filter(w=>!(w.from.kind==='comp'&&w.from.id===id)&&!(w.to.kind==='comp'&&w.to.id===id));
    state.components=state.components.filter(c=>c.id!==id);
    state.selected=null;renderAll();
  }
};
document.getElementById('btn-clear').onclick=()=>{if(confirm('Netejar?')){state.boards=[];state.components=[];state.wires=[];renderAll();}};
document.getElementById('wire-colors').querySelectorAll('.wc-dot').forEach(d=>d.onclick=()=>{document.querySelectorAll('.wc-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active');state.wireColor=d.dataset.color;});

function select(id){state.selected=id;document.querySelectorAll('.comp-group').forEach(e=>e.classList.remove('selected'));if(id!=null){const el=document.getElementById(`comp-${id}`);if(el)el.classList.add('selected');}renderAll();}
function updateView(){document.getElementById('world').setAttribute('transform',`translate(${state.view.x},${state.view.y})scale(${state.view.s})`);document.getElementById('zoom-pct').textContent=Math.round(state.view.s*100)+'%';}
function closeProps(){document.getElementById('props').classList.remove('open');}

setupDefs();buildPalette();buildBoardsPanel();updateView();renderAll();
document.getElementById('canvas-wrap').classList.add('move-mode');
</script>
