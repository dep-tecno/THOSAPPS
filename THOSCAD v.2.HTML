<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THOSCAD - Dibuix Tècnic Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #111827; }
        #root { height: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        
        /* Cursors personalitzats per a l'eina mà */
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            MousePointer2, Circle, Square, Hand, Trash2, Download, Ruler, 
            Sparkles, X, Loader2, Magnet, Type, Hexagon, Image as ImageIcon, 
            Check, Minus, ChevronDown, Save, FolderOpen, Scissors, PaintBucket,
            Undo2, Redo2, ZoomIn, ZoomOut
        } from 'lucide-react';

        /** UTILITATS MATEMÀTIQUES **/
        const generateId = () => Math.random().toString(36).substr(2, 9);
        // GridSize per defecte a 10 (Snap)
        const snap = (value, gridSize = 10) => Math.round(value / gridSize) * gridSize;
        const screenToWorld = (screenX, screenY, pan, zoom) => ({
            x: (screenX - pan.x) / zoom,
            y: (screenY - pan.y) / zoom,
        });
        const distance = (p1, p2) => Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        
        const distanceToSegment = (p, v, w) => {
            const l2 = distance(v, w) ** 2;
            if (l2 === 0) return distance(p, v);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return distance(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
        };

        const getMidPointControl = (p1, p2, offsetFactor = 0.3) => {
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            return { x: midX - dy * offsetFactor, y: midY + dx * offsetFactor };
        };
        const getAngle = (p1, p2) => Math.atan2(p2.y - p1.y, p2.x - p1.x) * (180 / Math.PI);
        const calculateOffset = (p1, p2, pMouse) => {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len === 0) return 0;
            const nx = -dy / len;
            const ny = dx / len;
            const vx = pMouse.x - p1.x;
            const vy = pMouse.y - p1.y;
            return vx * nx + vy * ny;
        };
        const getPolygonPoints = (center, radius, sides, startAngle = -Math.PI / 2) => {
            const points = [];
            for (let i = 0; i < sides; i++) {
                const angle = startAngle + (i * 2 * Math.PI) / sides;
                points.push({
                    x: center.x + radius * Math.cos(angle),
                    y: center.y + radius * Math.sin(angle)
                });
            }
            return points;
        };

        const describeArcPath = (x, y, radius, startAngle, endAngle) => {
            const largeArcFlag = (endAngle - startAngle) > Math.PI ? 1 : 0;
            const p1 = { x: x + radius * Math.cos(startAngle), y: y + radius * Math.sin(startAngle) };
            const p2 = { x: x + radius * Math.cos(endAngle), y: y + radius * Math.sin(endAngle) };
            return `M ${p1.x} ${p1.y} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${p2.x} ${p2.y}`;
        };

        /** ICONES PERSONALITZADES **/
        const LineIcon = ({ size = 24, ...props }) => React.createElement("svg", { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", ...props }, React.createElement("line", { x1: "4", y1: "20", x2: "20", y2: "4" }));
        const PolylineIcon = ({ size = 24, ...props }) => React.createElement("svg", { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", ...props }, React.createElement("polyline", { points: "3 7 9 17 15 7 21 17" }));
        const ArrowToolIcon = ({ size = 24, ...props }) => React.createElement("svg", { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", ...props }, [React.createElement("line", { key: "l", x1: "5", y1: "19", x2: "19", y2: "5" }), React.createElement("polyline", { key: "p", points: "12 5 19 5 19 12" })]);
        const ArcIcon = ({ size = 24, ...props }) => React.createElement("svg", { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", ...props }, React.createElement("path", { d: "M3 21c0-9.9 8.1-18 18-18" }));

        /** COMPONENTS **/
        const IconButton = ({ icon: Icon, active, onClick, title, disabled = false, special = false }) => (
            React.createElement("button", {
                onClick: onClick,
                disabled: disabled,
                title: title,
                className: `p-2 rounded-md transition-all duration-200 flex items-center justify-center
                ${active 
                    ? 'bg-blue-600 text-white shadow-lg scale-105' 
                    : special 
                    ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:from-purple-600 hover:to-pink-600 shadow-md'
                    : 'bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white'}
                ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`
            }, React.createElement(Icon, { size: 20 }))
        );

        const ToolbarDivider = () => React.createElement("div", { className: "w-px h-6 bg-gray-700 mx-1" });

        /** APP PRINCIPAL **/
        function CADApp() {
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [zoom, setZoom] = useState(1);
            const [history, setHistory] = useState([[]]); 
            const [historyStep, setHistoryStep] = useState(0);
            const [elements, setElements] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [clipboard, setClipboard] = useState([]); 

            const [tool, setTool] = useState('line'); 
            const [drawingState, setDrawingState] = useState(null); 
            const [draggingState, setDraggingState] = useState(null); 
            const [snapIndicator, setSnapIndicator] = useState(null); 
            
            const [textInput, setTextInput] = useState(null); 
            const inputRef = useRef(null); 
            const fileInputRef = useRef(null);

            const [polygonSides, setPolygonSides] = useState(6);
            const [properties, setProperties] = useState({ stroke: '#00ff00', strokeWidth: 2 });
            const [showGrid, setShowGrid] = useState(true);
            const [gridSnap, setGridSnap] = useState(true); 
            const [objectSnap, setObjectSnap] = useState(true); 

            const [showColorPicker, setShowColorPicker] = useState(false);
            const [colorPickerPos, setColorPickerPos] = useState({ x: 0, y: 0 });
            const colorButtonRef = useRef(null);

            const [showAiModal, setShowAiModal] = useState(false);
            const [aiPrompt, setAiPrompt] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);

            const svgRef = useRef(null);
            const BASIC_COLORS = ['#FFFFFF', '#FF0000', '#FFFF00', '#00FF00', '#00FFFF', '#0000FF', '#FF00FF', '#808080'];

            // --- CANVI EINA SEGUR ---
            const changeTool = (newTool) => {
                setTool(newTool);
                setDrawingState(null);
                setDraggingState(null);
                setTextInput(null);
                setSnapIndicator(null);
            };

            const saveHistory = (newElements) => {
                const newHistory = history.slice(0, historyStep + 1);
                newHistory.push(newElements);
                setHistory(newHistory);
                setHistoryStep(newHistory.length - 1);
                setElements(newElements);
            };

            const undo = () => {
                if (historyStep > 0) {
                    const newStep = historyStep - 1;
                    setHistoryStep(newStep);
                    setElements(history[newStep]);
                    setSelectedIds(new Set()); 
                }
            };

            const redo = () => {
                if (historyStep < history.length - 1) {
                    const newStep = historyStep + 1;
                    setHistoryStep(newStep);
                    setElements(history[newStep]);
                    setSelectedIds(new Set());
                }
            };

            const handleZoomIn = () => setZoom(z => Math.min(z * 1.2, 10));
            const handleZoomOut = () => setZoom(z => Math.max(z / 1.2, 0.1));

            // --- KEYBOARD SHORTCUTS ---
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (textInput || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    const isCtrl = e.ctrlKey || e.metaKey;
                    const key = e.key.toLowerCase();

                    if (isCtrl && key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
                    if ((isCtrl && key === 'y') || (isCtrl && e.shiftKey && key === 'z')) { e.preventDefault(); redo(); return; }
                    if (isCtrl && key === 'c') {
                        e.preventDefault();
                        if (selectedIds.size > 0) {
                            const toCopy = elements.filter(el => selectedIds.has(el.id));
                            setClipboard(toCopy);
                        }
                        return;
                    }
                    if (isCtrl && key === 'v') {
                        e.preventDefault();
                        if (clipboard.length > 0) {
                            const newElements = clipboard.map(el => {
                                const newId = generateId();
                                const offset = 20 / zoom; 
                                let props = { ...el, id: newId };
                                if (props.x !== undefined) props.x += offset;
                                if (props.y !== undefined) props.y += offset;
                                if (props.x1 !== undefined) { props.x1 += offset; props.y1 += offset; }
                                if (props.x2 !== undefined) { props.x2 += offset; props.y2 += offset; }
                                if (props.cx !== undefined) { props.cx += offset; props.cy += offset; }
                                if (props.points) props.points = props.points.map(p => ({ x: p.x + offset, y: p.y + offset }));
                                
                                if (props.type === 'dimension') {
                                    props.attachedToStart = null;
                                    props.attachedToEnd = null;
                                }
                                return props;
                            });
                            const nextElements = [...elements, ...newElements];
                            saveHistory(nextElements);
                            setSelectedIds(new Set(newElements.map(e => e.id)));
                        }
                        return;
                    }

                    if (key === 'escape') {
                        if (showAiModal) setShowAiModal(false);
                        else if (showColorPicker) setShowColorPicker(false);
                        else if (tool === 'polyline' && drawingState?.points?.length > 1) finishPolyline();
                        else if (drawingState) setDrawingState(null); 
                        else if (selectedIds.size > 0) setSelectedIds(new Set()); 
                    }
                    if (key === 'enter') {
                        if (tool === 'polyline' && drawingState?.points?.length > 1) finishPolyline();
                    }
                    if (key === 'delete' || key === 'backspace') {
                        if (!showAiModal) deleteSelected();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [tool, drawingState, selectedIds, showAiModal, textInput, showColorPicker, clipboard, elements, historyStep, zoom, history]); 

            useEffect(() => { if (textInput && inputRef.current) inputRef.current.focus(); }, [textInput]);

            useEffect(() => {
                if (selectedIds.size === 1) {
                    const id = [...selectedIds][0];
                    const el = elements.find(e => e.id === id);
                    if (el) setProperties(prev => ({ ...prev, stroke: el.style.stroke, strokeWidth: el.style.strokeWidth }));
                }
            }, [selectedIds, elements]);

            const confirmText = () => {
                if (textInput && textInput.value && textInput.value.trim() !== "") {
                    const fontSize = 20 / zoom; 
                    const newElement = {
                        id: generateId(), type: 'text', x: textInput.x, y: textInput.y,
                        text: textInput.value, fontSize: fontSize, style: { ...properties }
                    };
                    saveHistory([...elements, newElement]);
                }
                setTextInput(null);
            };

            const cancelText = () => setTextInput(null);

            const toggleColorPicker = () => {
                if (!showColorPicker && colorButtonRef.current) {
                    const rect = colorButtonRef.current.getBoundingClientRect();
                    setColorPickerPos({ x: rect.left, y: rect.bottom + 5 });
                }
                setShowColorPicker(!showColorPicker);
            };

            const updateProperties = (key, value) => {
                setProperties(prev => ({ ...prev, [key]: value }));
                if (selectedIds.size > 0) {
                    const updatedElements = elements.map(el => selectedIds.has(el.id) ? { ...el, style: { ...el.style, [key]: value } } : el);
                    saveHistory(updatedElements);
                }
            };

            const finishPolyline = () => {
                if (!drawingState || !drawingState.points || drawingState.points.length < 2) { setDrawingState(null); return; }
                const newElement = { id: generateId(), type: 'polyline', points: drawingState.points, style: { ...properties, fill: 'none' } };
                saveHistory([...elements, newElement]);
                setDrawingState(null);
            };
            
            const moveElement = (el, dx, dy) => {
                switch (el.type) {
                    case 'line': case 'arrow': return { ...el, x1: el.x1 + dx, y1: el.y1 + dy, x2: el.x2 + dx, y2: el.y2 + dy };
                    case 'dimension': 
                        const angle = Math.atan2(el.y2 - el.y1, el.x2 - el.x1);
                        const nx = -Math.sin(angle);
                        const ny = Math.cos(angle);
                        const deltaOffset = dx * nx + dy * ny;
                        return { ...el, offset: (el.offset || 0) + deltaOffset };
                    case 'rect': case 'text': return { ...el, x: el.x + dx, y: el.y + dy };
                    case 'circle': case 'polygon': return { ...el, cx: el.cx + dx, cy: el.cy + dy };
                    case 'polyline': return { ...el, points: el.points.map(p => ({ x: p.x + dx, y: p.y + dy })) };
                    case 'arc': return { ...el, x1: el.x1 + dx, y1: el.y1 + dy, x2: el.x2 + dx, y2: el.y2 + dy, cx: el.cx + dx, cy: el.cy + dy };
                    case 'circular_arc': return { ...el, cx: el.cx + dx, cy: el.cy + dy };
                    default: return el;
                }
            };

            const getObjectSnapPoint = (worldPos) => {
                const threshold = 10 / zoom; let closest = null; let minD = threshold;
                const check = (x, y, id) => { const d = distance(worldPos, {x, y}); if (d < minD) { minD = d; closest = { x, y, id }; } };
                elements.forEach(el => {
                    if (el.type === 'line' || el.type === 'arrow' || el.type === 'dimension') { check(el.x1, el.y1, el.id); check(el.x2, el.y2, el.id); }
                    else if (el.type === 'rect') { check(el.x, el.y, el.id); check(el.x + el.width, el.y, el.id); check(el.x, el.y + el.height, el.id); check(el.x + el.width, el.y + el.height, el.id); }
                    else if (el.type === 'polyline') { el.points.forEach(p => check(p.x, p.y, el.id)); }
                    else if (el.type === 'circle') {
                        check(el.cx, el.cy, el.id);
                        check(el.cx + el.r, el.cy, el.id);
                        check(el.cx - el.r, el.cy, el.id);
                        check(el.cx, el.cy + el.r, el.id);
                        check(el.cx, el.cy - el.r, el.id);
                    }
                    else if (el.type === 'polygon') {
                         check(el.cx, el.cy, el.id);
                         const pts = getPolygonPoints({x: el.cx, y: el.cy}, el.r, el.sides, el.rotation);
                         pts.forEach(p => check(p.x, p.y, el.id));
                    }
                    else if (el.type === 'circular_arc') { 
                         check(el.cx, el.cy, el.id);
                         check(el.cx + el.r * Math.cos(el.startAngle), el.cy + el.r * Math.sin(el.startAngle), el.id);
                         check(el.cx + el.r * Math.cos(el.endAngle), el.cy + el.r * Math.sin(el.endAngle), el.id);
                    }
                    else if (el.type === 'arc') { check(el.x1, el.y1, el.id); check(el.x2, el.y2, el.id); }
                });
                return closest;
            };

            const getMouseCoords = (e) => {
                if (!svgRef.current) return { x: 0, y: 0 };
                const rect = svgRef.current.getBoundingClientRect();
                const rawX = e.clientX - rect.left;
                const rawY = e.clientY - rect.top;
                const worldPos = screenToWorld(rawX, rawY, pan, zoom);
                
                const isDimensionOffset = tool === 'dimension' && drawingState?.phase === 'offset';
                const isMovingObject = draggingState?.type === 'move';

                if (objectSnap && !isDimensionOffset && !isMovingObject && tool !== 'cut' && tool !== 'fill') {
                    const snapPoint = getObjectSnapPoint(worldPos);
                    if (snapPoint) return { ...snapPoint, rawX, rawY, snapped: true, snapId: snapPoint.id };
                }
                if (gridSnap && !isDimensionOffset && !isMovingObject && tool !== 'cut' && tool !== 'fill') {
                    return { x: snap(worldPos.x), y: snap(worldPos.y), rawX, rawY };
                }
                return { ...worldPos, rawX, rawY };
            };

            const handleCut = (coords) => {
                let closestEl = null; let minD = 20 / zoom; 
                elements.forEach(el => {
                    if (el.type === 'line' || el.type === 'arrow') { const d = distanceToSegment(coords, {x: el.x1, y: el.y1}, {x: el.x2, y: el.y2}); if (d < minD) { minD = d; closestEl = el; } }
                    else if (el.type === 'rect') { const sides = [{p1:{x:el.x,y:el.y},p2:{x:el.x+el.width,y:el.y}},{p1:{x:el.x+el.width,y:el.y},p2:{x:el.x+el.width,y:el.y+el.height}},{p1:{x:el.x+el.width,y:el.y+el.height},p2:{x:el.x,y:el.y+el.height}},{p1:{x:el.x,y:el.y+el.height},p2:{x:el.x,y:el.y}}]; sides.forEach((s, i) => { const d = distanceToSegment(coords, s.p1, s.p2); if (d < minD) { minD = d; closestEl = { ...el, hitSide: i }; } }); }
                    else if (el.type === 'circle') { const d = Math.abs(distance(coords, {x: el.cx, y: el.cy}) - el.r); if (d < minD) { minD = d; closestEl = el; } }
                    else if (el.type === 'circular_arc') { 
                        const d = Math.abs(distance(coords, {x: el.cx, y: el.cy}) - el.r);
                        if (d < minD) {
                            const angle = Math.atan2(coords.y - el.cy, coords.x - el.cx);
                            let normAngle = angle < 0 ? angle + 2*Math.PI : angle;
                            if (normAngle >= el.startAngle - 0.1 && normAngle <= el.endAngle + 0.1) {
                                minD = d; closestEl = el; 
                            }
                        }
                    }
                    else if (el.type === 'arc') { for(let t=0; t<=1; t+=0.1) { const mt = 1-t; const x = mt*mt*el.x1 + 2*mt*t*el.cx + t*t*el.x2; const y = mt*mt*el.y1 + 2*mt*t*el.cy + t*t*el.y2; const d = distance(coords, {x,y}); if (d < minD) { minD = d; closestEl = el; } } }
                    else if (el.type === 'polyline' || el.type === 'polygon') { const pts = el.type === 'polygon' ? getPolygonPoints({x:el.cx, y:el.cy}, el.r, el.sides, el.rotation) : el.points; for (let i=0; i<pts.length - (el.type==='polyline'?1:0); i++) { const p1 = pts[i]; const p2 = pts[(i+1)%pts.length]; const d = distanceToSegment(coords, p1, p2); if (d < minD) { minD = d; closestEl = { ...el, hitSegment: i }; } } }
                });
                if (!closestEl) return;

                const newElementsList = elements.filter(e => e.id !== closestEl.id);
                const baseStyle = closestEl.style;

                if (closestEl.type === 'line' || closestEl.type === 'arrow') {
                    const mid = { x: (closestEl.x1 + closestEl.x2)/2, y: (closestEl.y1 + closestEl.y2)/2 };
                    if (distance(coords, {x: closestEl.x1, y: closestEl.y1}) < distance(coords, {x: closestEl.x2, y: closestEl.y2})) newElementsList.push({ ...closestEl, id: generateId(), x1: mid.x, y1: mid.y }); 
                    else newElementsList.push({ ...closestEl, id: generateId(), x2: mid.x, y2: mid.y }); 
                }
                else if (closestEl.type === 'rect') {
                    const sides = [{p1:{x:closestEl.x,y:closestEl.y},p2:{x:closestEl.x+closestEl.width,y:closestEl.y}},{p1:{x:closestEl.x+closestEl.width,y:closestEl.y},p2:{x:closestEl.x+closestEl.width,y:closestEl.y+closestEl.height}},{p1:{x:closestEl.x+closestEl.width,y:closestEl.y+closestEl.height},p2:{x:closestEl.x,y:closestEl.y+closestEl.height}},{p1:{x:closestEl.x,y:closestEl.y+closestEl.height},p2:{x:closestEl.x,y:closestEl.y}}];
                    sides.forEach((s, idx) => { if (idx !== closestEl.hitSide) newElementsList.push({ id: generateId(), type: 'line', x1: s.p1.x, y1: s.p1.y, x2: s.p2.x, y2: s.p2.y, style: baseStyle }); });
                }
                else if (closestEl.type === 'polyline' || closestEl.type === 'polygon') {
                    const pts = closestEl.type === 'polygon' ? getPolygonPoints({x:closestEl.cx, y:closestEl.cy}, closestEl.r, closestEl.sides, closestEl.rotation) : closestEl.points;
                    for (let i=0; i<pts.length - (closestEl.type==='polygon'?0:1); i++) { if (i !== closestEl.hitSegment) { const p2 = pts[(i+1)%pts.length]; newElementsList.push({ id: generateId(), type: 'line', x1: pts[i].x, y1: pts[i].y, x2: p2.x, y2: p2.y, style: baseStyle }); } }
                }
                else if (closestEl.type === 'circle') {
                    const angle = Math.atan2(coords.y - closestEl.cy, coords.x - closestEl.cx);
                    let normAngle = angle < 0 ? angle + 2*Math.PI : angle;
                    const quadrant = Math.floor(normAngle / (Math.PI/2));
                    for(let q=0; q<4; q++) { if (q !== quadrant) newElementsList.push({ id: generateId(), type: 'circular_arc', cx: closestEl.cx, cy: closestEl.cy, r: closestEl.r, startAngle: q * (Math.PI/2), endAngle: (q+1) * (Math.PI/2), style: baseStyle, fill: 'none' }); }
                }
                else if (closestEl.type === 'arc') {
                    const m = {x: (closestEl.x1+2*closestEl.cx+closestEl.x2)/4, y: (closestEl.y1+2*closestEl.cy+closestEl.y2)/4}; 
                    const m01 = {x: (closestEl.x1+closestEl.cx)/2, y: (closestEl.y1+closestEl.cy)/2};
                    const m12 = {x: (closestEl.cx+closestEl.x2)/2, y: (closestEl.cy+closestEl.y2)/2};
