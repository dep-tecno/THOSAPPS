    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================================================================
        // HELPERS MATEMÀTICS
        // ==========================================================================================

        const parseValue = (str) => {
            if (!str) return 0;
            const s = str.toString();
            const numStr = s.replace(/[^0-9.]/g, '');
            let val = parseFloat(numStr);
            if (isNaN(val)) return 0;
            // Sufix sensible a majúscules: m=milli(×10⁻³), k/K=kilo, M=Mega, G=giga
            const suffixMatch = s.match(/[0-9]\s*([a-zA-Z])/);
            if (suffixMatch) {
                const sfx = suffixMatch[1];
                if (sfx === 'k' || sfx === 'K') val *= 1e3;
                else if (sfx === 'M') val *= 1e6;
                else if (sfx === 'm') val *= 1e-3;
                else if (sfx === 'G' || sfx === 'g') val *= 1e9;
            }
            return val;
        };

        const RESISTOR_COLORS = [
            { name: 'Negre',   hex: '#1a1a1a', text: '#ffffff' },
            { name: 'Marró',   hex: '#8B4513', text: '#ffffff' },
            { name: 'Vermell', hex: '#cc0000', text: '#ffffff' },
            { name: 'Taronja', hex: '#FF8C00', text: '#000000' },
            { name: 'Groc',    hex: '#FFD700', text: '#000000' },
            { name: 'Verd',    hex: '#228B22', text: '#ffffff' },
            { name: 'Blau',    hex: '#1a3aff', text: '#ffffff' },
            { name: 'Violeta', hex: '#8B00FF', text: '#ffffff' },
            { name: 'Gris',    hex: '#808080', text: '#ffffff' },
            { name: 'Blanc',   hex: '#f0f0f0', text: '#000000' },
        ];
        const GOLD_BAND = { name: 'Or', hex: '#CFB53B', text: '#000000' };

        const getResistorBands = (valueStr) => {
            const val = parseValue(valueStr);
            if (!val || val <= 0) return null;
            let mantissa = val;
            let exp = 0;
            while (mantissa >= 100) { mantissa /= 10; exp++; }
            while (mantissa < 10)   { mantissa *= 10; exp--; }
            const d1 = Math.floor(mantissa / 10);
            const d2 = Math.floor(mantissa % 10);
            if (exp < 0 || exp > 7 || d1 < 0 || d1 > 9 || d2 < 0 || d2 > 9) return null;
            const mult = Math.pow(10, exp);
            const multLabel = mult >= 1e6 ? `×${mult/1e6}MΩ` : mult >= 1e3 ? `×${mult/1e3}kΩ` : `×${mult}Ω`;
            return [
                { ...RESISTOR_COLORS[d1], role: String(d1) },
                { ...RESISTOR_COLORS[d2], role: String(d2) },
                { ...RESISTOR_COLORS[exp], role: multLabel },
                { ...GOLD_BAND, role: '±5%' },
            ];
        };

        const formatValue = (num, unit) => {
            const abs = Math.abs(num);
            if (abs < 1e-9) return `0.00 ${unit}`;
            if (abs < 0.001) return `${(num * 1000000).toFixed(2)} µ${unit}`;
            if (abs < 0.1) return `${(num * 1000).toFixed(2)} m${unit}`;
            if (abs >= 1000000) return `${(num / 1000000).toFixed(2)} M${unit}`;
            if (abs >= 1000) return `${(num / 1000).toFixed(2)} k${unit}`;
            return `${num.toFixed(2)} ${unit}`;
        };

        const makeUnionFind = () => {
            const parent = {};
            const find = (i) => {
                if (parent[i] === undefined) parent[i] = i;
                if (parent[i] !== i) parent[i] = find(parent[i]);
                return parent[i];
            };
            const union = (i, j) => {
                const ri = find(i);
                const rj = find(j);
                if (ri !== rj) parent[ri] = rj;
            };
            return { find, union, parent };
        };

        const getComponentResistance = (comp) => {
            if (comp.type === 'RESISTOR') return parseValue(comp.value);
            if (comp.type === 'LIGHT')   return LIGHT_R;
            if (comp.type === 'LED')     return comp.state?.ledReversed ? LED_BLOCKED_R : LED_R;
            if (comp.type === 'MOTOR')   return MOTOR_R;
            return 0;
        };

        const solveLinearSystem = (A, b) => {
            const n = A.length;
            const M = A.map(row => [...row]);
            const x = [...b];

            for (let i = 0; i < n; i++) {
                let maxEl = Math.abs(M[i][i]);
                let maxRow = i;
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(M[k][i]) > maxEl) { maxEl = Math.abs(M[k][i]); maxRow = k; }
                }
                for (let k = i; k < n; k++) { const tmp = M[maxRow][k]; M[maxRow][k] = M[i][k]; M[i][k] = tmp; }
                const tmpVal = x[maxRow]; x[maxRow] = x[i]; x[i] = tmpVal;

                for (let k = i + 1; k < n; k++) {
                    const c = -M[k][i] / M[i][i];
                    if (!isFinite(c)) continue;
                    for (let j = i; j < n; j++) {
                        if (i === j) M[k][j] = 0;
                        else M[k][j] += c * M[i][j];
                    }
                    x[k] += c * x[i];
                }
            }

            const result = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                let sum = 0;
                for (let j = i + 1; j < n; j++) { sum += M[i][j] * result[j]; }
                result[i] = (x[i] - sum) / M[i][i];
                if (!isFinite(result[i])) result[i] = 0;
            }
            return result;
        };

        const XIcon = (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;

        // ==========================================================================================
        // CONSTANTS I CONFIGURACIÓ
        // ==========================================================================================
        
        const COMPONENT_PORTS = {
            BATTERY: [{ x: -20, y: 0 }, { x: 20, y: 0 }], 
            RESISTOR: [{ x: -40, y: 0 }, { x: 40, y: 0 }],
            LIGHT: [{ x: -40, y: 0 }, { x: 40, y: 0 }],
            LED: [{ x: -20, y: 0 }, { x: 20, y: 0 }],
            MOTOR: [{ x: 0, y: -40 }, { x: 0, y: 40 }],
            JUNCTION: [{ x: 0, y: 0 }],
            SWITCH: [{ x: -40, y: 0 }, { x: 40, y: 0 }],
            AND: [{ x: -40, y: -20 }, { x: -40, y: 20 }, { x: 40, y: 0 }],
            OR: [{ x: -40, y: -20 }, { x: -40, y: 20 }, { x: 40, y: 0 }],
            NOT: [{ x: -40, y: 0 }, { x: 40, y: 0 }],
            NAND: [{ x: -40, y: -20 }, { x: -40, y: 20 }, { x: 40, y: 0 }],
            NOR: [{ x: -40, y: -20 }, { x: -40, y: 20 }, { x: 40, y: 0 }],
            XOR: [{ x: -40, y: -20 }, { x: -40, y: 20 }, { x: 40, y: 0 }],
            LOGIC_SOURCE: [{ x: 40, y: 0 }], 
            LOGIC_PROBE: [{ x: -40, y: 0 }],
            VOLTMETER: [{ x: 20, y: 40 }, { x: -20, y: 40 }], 
            AMMETER: [{ x: -40, y: 0 }, { x: 40, y: 0 }], 
            SCOPE: [{ x: -40, y: 0 }],
            TEXT: [] 
        };
        
        const GRID_SIZE = 20; 
        
        const COLORS = {
            BG: '#1a1a1a', GRID: '#333333', STROKE: '#ffffff', SELECTION: '#00ffcc',
            PORT: '#ff0055', PORT_HOVER: '#ffff00', 
            WIRE: '#006600', WIRE_ACTIVE: '#00ff00', WIRE_HOVER: '#00aaff', WIRE_SEL: '#00ffff', WIRE_TEMP: '#ffffff',
            JUNCTION: '#ffffff',
            GATE_FILL: '#262626', GATE_STROKE: '#e5e7eb'
        };

        // Simulation constants
        const LIGHT_R        = 20;       // Equivalent resistance of a light bulb (Ω)
        const LED_R          = 100;      // Equivalent resistance of a forward-biased LED (Ω)
        const LED_BLOCKED_R  = 1e9;      // Resistance of a reverse-biased LED (acts as open circuit)
        const MOTOR_R        = 50;       // Equivalent resistance of a motor (Ω)
        const WIRE_R_VISUAL  = 0.1;      // Wire resistance used in visual MNA pass (Ω)
        const WIRE_R_IDEAL   = 0.000001; // Wire resistance used in ideal MNA pass (Ω)
        const LOGIC_INPUT_G  = 1e-4;     // Conductance added at logic gate/probe inputs (S)
        const MNA_EPSILON    = 1e-9;     // Numerical stability term added to MNA diagonal
        const MIN_CURRENT    = 1e-6;     // Minimum current threshold for display/animation (A)
        const TOOLBAR_PX     = 64;       // Approximate toolbar height in screen pixels

        // ==========================================================================================
        // APLICACIÓ PRINCIPAL
        // ==========================================================================================

        function App() {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const fileInputRef = useRef(null);
            const isFirstRender = useRef(true);
            const toolbarRef = useRef(null);
            const toolbarNaturalWidth = useRef(null);
            const [autoSaveStatus, setAutoSaveStatus] = useState(null);
            const [panelPos, setPanelPos] = useState(null);
            const [toolbarZoom, setToolbarZoom] = useState(1);
            const panelDragRef = useRef(null);

            // Estat inicial: carrega des de localStorage si hi ha dades guardades
            const [components, setComponents] = useState(() => {
                try { const s = localStorage.getItem('thoslab_autosave'); if (s) return JSON.parse(s).components || []; } catch(e) {}
                return [];
            });
            const [wires, setWires] = useState(() => {
                try { const s = localStorage.getItem('thoslab_autosave'); if (s) return JSON.parse(s).wires || []; } catch(e) {}
                return [];
            });
            const [history, setHistory] = useState([]);
            const [future, setFuture] = useState([]);
            
            const [logicSymbolStandard, setLogicSymbolStandard] = useState('ANSI'); 
            const [dashOffset, setDashOffset] = useState(0);

            const [view, setView] = useState({ x: 0, y: 0, scale: 1 });
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });
            
            const stateRef = useRef({ components, wires, selection: null });
            
            const [selection, setSelection] = useState(null);
            const [showCompPanel, setShowCompPanel] = useState(null);
            const [canvasSize, setCanvasSize] = useState({ width: 800, height: 600 });
            const [isDraggingComp, setIsDraggingComp] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [dragStartPos, setDragStartPos] = useState({ x: 0, y: 0 });
            const [drawingState, setDrawingState] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 }); 
            const [hoveredWireSeg, setHoveredWireSeg] = useState(null);
            const [draggingWireSeg, setDraggingWireSeg] = useState(null); 
            const [hoveredPort, setHoveredPort] = useState(null);
            const [showLogicMenu, setShowLogicMenu] = useState(false);
            const [showInstrMenu, setShowInstrMenu] = useState(false);
            const [panMode, setPanMode] = useState(false);
            const [editingValues, setEditingValues] = useState({});
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [boxSelectStart, setBoxSelectStart] = useState(null);
            const [boxSelectEnd, setBoxSelectEnd] = useState(null);
            const multiDragOffsetsRef = useRef({});
            const [clipboard, setClipboard] = useState(null);
            const [editingLabel, setEditingLabel] = useState(null);
            const [hoveredCompId, setHoveredCompId] = useState(null);
            const [tooltipScreenPos, setTooltipScreenPos] = useState({ x: 0, y: 0 });
                const [truthTable, setTruthTable] = useState(null);
            const [portVoltageMap, setPortVoltageMap] = useState({});
                const [selectedInputIdsForTable, setSelectedInputIdsForTable] = useState([]);

            useEffect(() => { stateRef.current = { components, wires, selection }; }, [components, wires, selection]);

            useEffect(() => {
                if (isFirstRender.current) { isFirstRender.current = false; return; }
                const timer = setTimeout(() => {
                    try {
                        localStorage.setItem('thoslab_autosave', JSON.stringify({ components, wires }));
                        setAutoSaveStatus('saved');
                        setTimeout(() => setAutoSaveStatus(null), 2000);
                    } catch(e) {}
                }, 1500);
                return () => clearTimeout(timer);
            }, [components, wires]);

            useEffect(() => {
                if (!toolbarRef.current) return;
                toolbarNaturalWidth.current = toolbarRef.current.scrollWidth;
                const updateZoom = () => {
                    if (!toolbarNaturalWidth.current) return;
                    setToolbarZoom(Math.min(1, window.outerWidth / toolbarNaturalWidth.current));
                };
                updateZoom();
                window.addEventListener('resize', updateZoom);
                return () => window.removeEventListener('resize', updateZoom);
            }, []);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const stopBrowserZoom = (e) => { if (e.ctrlKey) e.preventDefault(); };
                canvas.addEventListener('wheel', stopBrowserZoom, { passive: false });
                return () => canvas.removeEventListener('wheel', stopBrowserZoom);
            }, []);

            useEffect(() => {
                if (!containerRef.current) return;
                const observer = new ResizeObserver(entries => {
                    const { width, height } = entries[0].contentRect;
                    if (width > 0 && height > 0) setCanvasSize({ width, height });
                });
                observer.observe(containerRef.current);
                return () => observer.disconnect();
            }, []);

            const saveToHistory = () => {
                setHistory(prev => [...prev.slice(-10), { components: JSON.parse(JSON.stringify(components)), wires: JSON.parse(JSON.stringify(wires)) }]);
                setFuture([]);
            };

            const undo = () => {
                if (history.length === 0) return;
                const lastState = history[history.length - 1];
                setFuture(prev => [...prev.slice(-10), { components: JSON.parse(JSON.stringify(components)), wires: JSON.parse(JSON.stringify(wires)) }]);
                setComponents(lastState.components);
                setWires(lastState.wires);
                setHistory(prev => prev.slice(0, -1));
            };

            const redo = () => {
                if (future.length === 0) return;
                const nextState = future[future.length - 1];
                setHistory(prev => [...prev.slice(-10), { components: JSON.parse(JSON.stringify(components)), wires: JSON.parse(JSON.stringify(wires)) }]);
                setComponents(nextState.components);
                setWires(nextState.wires);
                setFuture(prev => prev.slice(0, -1));
            };

            const newCircuit = () => {
                if (components.length === 0 && wires.length === 0) return;
                if (!window.confirm('Crear un circuit nou? Es perdrà el circuit actual no guardat.')) return;
                saveToHistory();
                setComponents([]); setWires([]); setSelection(null);
                setSelectedIds(new Set()); setShowCompPanel(null);
            };

            const fitView = () => {
                if (components.length === 0) { setView({ x: 0, y: 0, scale: 1 }); return; }
                const xs = components.map(c => c.x);
                const ys = components.map(c => c.y);
                const minX = Math.min(...xs) - 100; const maxX = Math.max(...xs) + 100;
                const minY = Math.min(...ys) - 100; const maxY = Math.max(...ys) + 100;
                const scaleX = canvasSize.width / (maxX - minX);
                const scaleY = canvasSize.height / (maxY - minY);
                const scale = Math.min(scaleX, scaleY, 2);
                const cx = (minX + maxX) / 2; const cy = (minY + maxY) / 2;
                setView({ x: canvasSize.width / 2 - cx * scale, y: canvasSize.height / 2 - cy * scale, scale });
            };

            const saveProject = () => {
                const data = JSON.stringify({ components, wires }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'circuit_thoslab.json';
                a.click();
            };

            const loadProject = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if (data.components && data.wires) {
                            saveToHistory();
                            setComponents(data.components);
                            setWires(data.wires);
                        }
                    } catch (err) {
                        alert("Error carregant l'arxiu");
                    }
                };
                reader.readAsText(file);
            };

            const exportImage = () => {
                if (canvasRef.current) {
                    const link = document.createElement('a');
                    link.download = 'circuit_thoslab.png';
                    link.href = canvasRef.current.toDataURL('image/png');
                    link.click();
                }
            };

            const activateSelectMode = () => {
                setDrawingState(null);
                setDraggingWireSeg(null);
                setSelection(null);
                setSelectedIds(new Set());
                setBoxSelectStart(null);
                setBoxSelectEnd(null);
            };

            const toggleLogicStandard = () => {
                setLogicSymbolStandard(prev => prev === 'ANSI' ? 'IEC' : 'ANSI');
            };

            // Bucle lògic (Calcula física) - 20Hz
            useEffect(() => {
                const simulationLoop = setInterval(runPhysicalSimulation, 50); 
                return () => clearInterval(simulationLoop);
            }, []);

            // Bucle visual (Anima elements) - 60Hz
            useEffect(() => {
                let animId;
                const animate = () => {
                    setDashOffset(prev => (prev + 0.5) % 20); 

                    setComponents(prev => {
                        let changed = false;
                        const newComps = prev.map(c => {
                            if (c.type === 'MOTOR' && Math.abs(c.state?.voltage || 0) > 0.1) {
                                changed = true;
                                const speed = (c.state.voltage || 0) * 2; 
                                const currentAngle = c.state.rotationAngle || 0;
                                return { ...c, state: { ...c.state, rotationAngle: (currentAngle + speed) % 360 } };
                            }
                            return c;
                        });
                        return changed ? newComps : prev;
                    });
                    animId = requestAnimationFrame(animate);
                };
                animId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animId);
            }, []);

            const screenToWorld = (sx, sy) => ({ x: (sx - view.x) / view.scale, y: (sy - view.y) / view.scale });

            const runPhysicalSimulation = () => {
                const { components: comps, wires } = stateRef.current;
                
                const { find, union } = makeUnionFind();

                // Unir ports interns de components conductors ideals
                comps.forEach(c => {
                    if (c.type === 'JUNCTION') union(`${c.id}:0`, `${c.id}:0`);
                    if (c.type === 'SWITCH' && c.state?.isOn) union(`${c.id}:0`, `${c.id}:1`);
                });

                const getRoot = (compId, portIdx) => find(`${compId}:${portIdx}`);

                // MNA SETUP
                const nodeMap = {};
                let nodeCount = 0;
                const uniqueRoots = new Set();
                
                comps.forEach(c => {
                    const ports = COMPONENT_PORTS[c.type];
                    if(ports) ports.forEach((_, idx) => uniqueRoots.add(getRoot(c.id, idx)));
                });
                
                let groundRoot = null;
                const firstBat = comps.find(c => c.type === 'BATTERY');
                if (firstBat) {
                    groundRoot = getRoot(firstBat.id, 0); 
                    nodeMap[groundRoot] = -1;
                }
                
                uniqueRoots.forEach(root => { if (root !== groundRoot) nodeMap[root] = nodeCount++; });
                
                const voltageSources = [];
                comps.forEach(c => {
                     if (c.type === 'BATTERY') voltageSources.push({ type: 'BAT', id: c.id, val: parseValue(c.value), p: 1, n: 0 }); 
                     else if (c.type === 'AMMETER') voltageSources.push({ type: 'AMM', id: c.id, val: 0, p: 1, n: 0 }); 
                     else if (c.type === 'LOGIC_SOURCE') voltageSources.push({ type: 'LOG', id: c.id, val: c.state?.isOn ? 5 : 0, p: 0, n: null });
                     else if (['AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR'].includes(c.type)) {
                         const outP = c.type === 'NOT' ? 1 : 2;
                         const outVal = c.state?.logicOut ? 5 : 0;
                         voltageSources.push({ type: 'GATE', id: c.id, val: outVal, p: outP, n: null });
                     }
                });

                const totalVars = nodeCount + voltageSources.length;
                const G = Array(totalVars).fill(0).map(() => Array(totalVars).fill(0));
                const I = Array(totalVars).fill(0);

                const addConductance = (matrix, uRoot, vRoot, g) => {
                    const u = nodeMap[uRoot];
                    const v = nodeMap[vRoot];
                    if (u !== undefined && u !== -1) { matrix[u][u] += g; }
                    if (v !== undefined && v !== -1) { matrix[v][v] += g; }
                    if (u !== undefined && u !== -1 && v !== undefined && v !== -1) { matrix[u][v] -= g; matrix[v][u] -= g; }
                };

                // Components
                comps.forEach(c => {
                    const r = getComponentResistance(c);
                    if (r > 0) {
                        addConductance(G, getRoot(c.id, 0), getRoot(c.id, 1), 1 / r);
                    }
                    const ports = COMPONENT_PORTS[c.type];
                    if (ports) {
                        ports.forEach((_, idx) => {
                             const u = nodeMap[getRoot(c.id, idx)];
                             if (u !== undefined && u !== -1) G[u][u] += MNA_EPSILON;
                        });
                        if (['AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR', 'LOGIC_PROBE'].includes(c.type)) {
                             const inputIndices = c.type === 'LOGIC_PROBE' ? [0] : (c.type === 'NOT' ? [0] : [0, 1]);
                             inputIndices.forEach(idx => {
                                 const root = getRoot(c.id, idx);
                                 const u = nodeMap[root];
                                 if (u !== undefined && u !== -1) { G[u][u] += LOGIC_INPUT_G; }
                             });
                        }
                    }
                });

                // Cables (Visual Pass)
                wires.forEach(w => {
                    const rWire = WIRE_R_VISUAL;
                    const g = 1 / rWire;
                    const uRoot = getRoot(w.fromComp, w.fromPort);
                    const vRoot = getRoot(w.toComp, w.toPort);

                    }
                });

                voltageSources.forEach((src, idx) => {
                    const row = nodeCount + idx;
                    const u = src.p !== null ? nodeMap[getRoot(src.id, src.p)] : undefined;
                    const v = src.n !== null ? nodeMap[getRoot(src.id, src.n)] : -1;
                    if (u !== undefined && u !== -1) { G[row][u] = 1; G[u][row] = 1; }
                    if (v !== undefined && v !== -1) { G[row][v] = -1; G[v][row] = -1; }
                    I[row] = src.val;

                const solution = solveLinearSystem(G, I);
                const getNodeVoltage = (compId, portIdx) => {
                    const root = getRoot(compId, portIdx);
                    const idx = nodeMap[root];
                    if (idx === -1) return 0; 
                    if (idx === undefined) return 0; 
                    return solution[idx];
                };
                const getSourceCurrent = (compId) => {
                    const srcIdx = voltageSources.findIndex(s => s.id === compId);
                    if (srcIdx !== -1) return solution[nodeCount + srcIdx];
                    return 0;
                };
                
                // Helper to perform the IDEAL pass separately
                const solveIdeal = () => {
                    // Reset matrices
                    const G2 = Array(totalVars).fill(0).map(() => Array(totalVars).fill(0));
                    const I2 = Array(totalVars).fill(0);
                    

                    // Re-add components
                    comps.forEach(c => {
                        const r = getComponentResistance(c);
                        if (r > 0) {
                            addConductance(G2, getRoot(c.id, 0), getRoot(c.id, 1), 1 / r);
                        }
                        const ports = COMPONENT_PORTS[c.type];
                        if (ports) {
                            ports.forEach((_, idx) => {
                                 const u = nodeMap[getRoot(c.id, idx)];
                                 if (u !== undefined && u !== -1) G2[u][u] += MNA_EPSILON;
                            });
                             if (['AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR', 'LOGIC_PROBE'].includes(c.type)) {
                                 const inputIndices = c.type === 'LOGIC_PROBE' ? [0] : (c.type === 'NOT' ? [0] : [0, 1]);
                                 inputIndices.forEach(idx => {
                                     const root = getRoot(c.id, idx);
                                     const u = nodeMap[root];
                                     if (u !== undefined && u !== -1) { G2[u][u] += LOGIC_INPUT_G; }

                            }

                    // IDEAL WIRES (Very low R)
                    wires.forEach(w => {
                        const rWire = WIRE_R_IDEAL;
                        const g = 1 / rWire;
                        const uRoot = getRoot(w.fromComp, w.fromPort);
                        const vRoot = getRoot(w.toComp, w.toPort);

                        }
                    });

                    // Sources
                    voltageSources.forEach((src, idx) => {
                        const row = nodeCount + idx;
                        const u = src.p !== null ? nodeMap[getRoot(src.id, src.p)] : undefined;
                        const v = src.n !== null ? nodeMap[getRoot(src.id, src.n)] : -1;
                        if (u !== undefined && u !== -1) { G2[row][u] = 1; G2[u][row] = 1; }
                        if (v !== undefined && v !== -1) { G2[row][v] = -1; G2[v][row] = -1; }
                        I2[row] = src.val;
                    });
                    
                    const sol2 = solveLinearSystem(G2, I2);
                    const getNodeV2 = (cId, pIdx) => {
                        const r = getRoot(cId, pIdx);
                        const idx = nodeMap[r];
                        if (idx === -1) return 0; if (idx === undefined) return 0; return sol2[idx];
                    };
                    const getSourceI2 = (cId) => {
                        const sIdx = voltageSources.findIndex(s => s.id === cId);
                        if (sIdx !== -1) return sol2[nodeCount + sIdx];
                        return 0;
                    };
                    return { getNodeVoltage: getNodeV2, getSourceCurrent: getSourceI2 };
                };

                const ideal = solveIdeal();
                const visual = { getNodeVoltage, getSourceCurrent }; // The main pass was visual (R=0.1)

                // Topology for visual loop activation
                const adj = new Map(); 
                const registerConn = (root, compId) => {
                    if (!adj.has(root)) adj.set(root, new Set());
                    adj.get(root).add(compId);
                };
                const { find: findV, union: unionV } = makeUnionFind();
                comps.forEach(c => { if(c.type==='JUNCTION') unionV(`${c.id}:0`, `${c.id}:0`); if(c.type==='SWITCH'&&c.state?.isOn) unionV(`${c.id}:0`,`${c.id}:1`); });
                const getRootV = (c, p) => findV(`${c}:${p}`);

                comps.forEach(c => {
                    if (['BATTERY', 'RESISTOR', 'LIGHT', 'LED', 'MOTOR', 'AMMETER'].includes(c.type) || (c.type === 'SWITCH' && c.state?.isOn)) {
                        const r0 = getRootV(c.id, 0); const r1 = getRootV(c.id, 1);
                        if (r0 !== r1) { registerConn(r0, c.id); registerConn(r1, c.id); }
                    }
                    if (['LOGIC_SOURCE', 'LOGIC_PROBE', 'AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR'].includes(c.type)) {
                        const ports = COMPONENT_PORTS[c.type];
                        ports.forEach((_, idx) => registerConn(getRootV(c.id, idx), c.id));
                    }
                });
                wires.forEach(w => {
                     const rS = getRootV(w.fromComp, w.fromPort); const rE = getRootV(w.toComp, w.toPort);
                     const wId = "WIRE_" + w.id; registerConn(rS, wId); registerConn(rE, wId);
                });
                let activeNodes = new Set(adj.keys());
                const anchorNodes = new Set();
                comps.forEach(c => {
                    if (['LOGIC_SOURCE', 'BATTERY'].includes(c.type)) { const ports = COMPONENT_PORTS[c.type]; ports.forEach((_, idx) => anchorNodes.add(getRootV(c.id, idx))); }
                    if (['LOGIC_PROBE', 'AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR'].includes(c.type)) { if(c.type==='NOT'||c.type==='LOGIC_PROBE') anchorNodes.add(getRootV(c.id, 0)); else { anchorNodes.add(getRootV(c.id, 0)); anchorNodes.add(getRootV(c.id, 1)); } }
                });
                let pruning = true;
                while (pruning) {
                    pruning = false; const toRemove = [];
                    activeNodes.forEach(node => {
                        if (anchorNodes.has(node)) return; 
                        const connectedItems = adj.get(node);
                        let validConnections = 0;
                        if (connectedItems) {
                            connectedItems.forEach(itemId => {
                                let otherNode = null;
                                if (itemId.startsWith("WIRE_")) {
                                    const w = wires.find(x => "WIRE_" + x.id === itemId);
                                    if(w) { otherNode = (getRootV(w.fromComp, w.fromPort) === node) ? getRootV(w.toComp, w.toPort) : getRootV(w.fromComp, w.fromPort); }
                                } else {
                                    const c = comps.find(k => k.id === itemId);
                                    if(c) {
                                        if(['RESISTOR', 'LIGHT', 'LED', 'MOTOR', 'AMMETER'].includes(c.type) || (c.type === 'SWITCH' && c.state?.isOn)) {
                                            otherNode = (getRootV(c.id, 0) === node) ? getRootV(c.id, 1) : getRootV(c.id, 0);
                                        }
                                    }
                                }
                                if (otherNode && activeNodes.has(otherNode)) validConnections++;
                            });
                        }
                        if (validConnections <= 1) toRemove.push(node);
                    });
                    if (toRemove.length > 0) { toRemove.forEach(n => activeNodes.delete(n)); pruning = true; }
                }

                setWires(prevWires => {
                    let wChanged = false;
                    const updatedWires = prevWires.map(w => {
                        const vStart = visual.getNodeVoltage(w.fromComp, w.fromPort);
                        const vEnd = visual.getNodeVoltage(w.toComp, w.toPort);
                        const rootStart = getRootV(w.fromComp, w.fromPort);
                        const rootEnd = getRootV(w.toComp, w.toPort);
                        const inTopology = activeNodes.has(rootStart) && activeNodes.has(rootEnd);
                        const current = (vStart - vEnd) / 0.1; 
                        const hasCurrent = Math.abs(current) > MIN_CURRENT;
                        const hasVoltage = vStart > 2.0 || vEnd > 2.0;
                        const isPowered = (inTopology && hasCurrent) || hasVoltage;
                        const isReverse = vEnd > vStart; // CONVENTIONAL is + to -
                        
                        let speedFactor = 1;
                        if (hasCurrent) { speedFactor = Math.max(0.5, Math.min(4, Math.log10(Math.abs(current) / 1e-6) * 0.5)); }
                        if (w.isPowered !== isPowered || w.isReverse !== isReverse || w.speedFactor !== speedFactor) { wChanged = true; return { ...w, isPowered, isReverse, speedFactor }; }
                        return w;
                    });
                    return wChanged ? updatedWires : prevWires;
                });

                setComponents(currentComponents => {
                    let changed = false;
                    const newComps = currentComponents.map(c => {
                        let newState = { ...c.state };
                        let newVal = c.value;
                        let hasUpdate = false;

                        const v0_ideal = ideal.getNodeVoltage(c.id, 0);
                        const v1_ideal = (c.type !== 'LOGIC_SOURCE' && c.type !== 'LOGIC_PROBE' && c.type !== 'SCOPE') ? ideal.getNodeVoltage(c.id, 1) : 0;
                        const v0_vis = visual.getNodeVoltage(c.id, 0);
                        const v1_vis = (c.type !== 'LOGIC_SOURCE' && c.type !== 'LOGIC_PROBE' && c.type !== 'SCOPE') ? visual.getNodeVoltage(c.id, 1) : 0;
                        const vDrop_vis = v0_vis - v1_vis;

                        if (['AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR'].includes(c.type)) {
                            const inA = v0_ideal > 2.5; 
                            const inB = c.type !== 'NOT' && v1_ideal > 2.5;
                            let out = false;
                            if (c.type === 'AND') out = inA && inB;
                            else if (c.type === 'OR') out = inA || inB;
                            else if (c.type === 'NOT') out = !inA;
                            else if (c.type === 'NAND') out = !(inA && inB);
                            else if (c.type === 'NOR') out = !(inA || inB);
                            else if (c.type === 'XOR') out = (inA && !inB) || (!inA && inB);
                            if (newState.logicOut !== out) { newState.logicOut = out; hasUpdate = true; }
                        }

                        if (['LIGHT', 'MOTOR'].includes(c.type)) {
                            const root0 = getRootV(c.id, 0); const root1 = getRootV(c.id, 1);
                            const inLoop = activeNodes.has(root0) && activeNodes.has(root1);
                            const hasVol = Math.abs(vDrop_vis) > 0.5;
                            const isActive = inLoop && hasVol;
                            if (newState.isActive !== isActive) { newState.isActive = isActive; hasUpdate = true; }
                            const vd = v0_ideal - v1_ideal;
                            const compR = c.type === 'MOTOR' ? 10 : 100;
                            const cur = compR > 0 ? vd / compR : 0;
                            if (newState.simVdrop !== vd || newState.simCurrent !== cur) {
                                newState.simVdrop = vd; newState.simCurrent = cur;
                                if (c.type === 'MOTOR') newState.voltage = vDrop_vis;
                                hasUpdate = true;
                            }
                        }
                        if (c.type === 'LED') {
                            const root0 = getRootV(c.id, 0); const root1 = getRootV(c.id, 1);
                            const inLoop = activeNodes.has(root0) && activeNodes.has(root1);
                            const vd = v0_ideal - v1_ideal;
                            const isForward = vd > 0.5;
                            const isActive = inLoop && isForward;
                            const cur = isForward ? vd / LED_R : 0;
                            const ledReversed = vd < -0.1;
                            if (newState.isActive !== isActive || newState.ledReversed !== ledReversed ||
                                newState.simVdrop !== vd || newState.simCurrent !== cur) {
                                newState.isActive = isActive;
                                newState.ledReversed = ledReversed;
                                newState.simVdrop = vd;
                                newState.simCurrent = cur;
                                hasUpdate = true;
                            }
                        }

                        if (c.type === 'VOLTMETER') {
                            const vDrop_ideal = v0_ideal - v1_ideal;
                            const txt = formatValue(vDrop_ideal, 'V');
                            if (newVal !== txt) { newVal = txt; hasUpdate = true; }
                        }
                        if (c.type === 'AMMETER') {
                            const current = ideal.getSourceCurrent(c.id);
                            const txt = formatValue(current, 'A');
                            if (newVal !== txt) { newVal = txt; hasUpdate = true; }
                        }
                        if (c.type === 'SCOPE') {
                            const history = newState.history || Array(50).fill(0);
                            const newHistory = [...history.slice(1), v0_ideal];
                            newState.history = newHistory; hasUpdate = true;
                        }
                        if (c.type === 'LOGIC_PROBE') {
                            const isActive = v0_ideal > 2.5;
                            if (newState.isActive !== isActive) { newState.isActive = isActive; hasUpdate = true; }
                            if (newState.simVdrop !== v0_ideal) { newState.simVdrop = v0_ideal; hasUpdate = true; }
                        }

                        if (c.type === 'LOGIC_SOURCE') {
                            const outV = c.state?.isOn ? 5 : 0;
                            if (newState.simVdrop !== outV) { newState.simVdrop = outV; hasUpdate = true; }
                        }

                        if (c.type === 'RESISTOR') {
                            const vd = v0_ideal - v1_ideal;
                            const r = parseValue(c.value);
                            const cur = r > 0 ? vd / r : 0;
                            if (newState.simVdrop !== vd || newState.simCurrent !== cur) {
                                newState.simVdrop = vd; newState.simCurrent = cur; hasUpdate = true;
                            }
                        }

                        if (c.type === 'BATTERY') {
                            const cur = ideal.getSourceCurrent(c.id);
                            if (newState.simCurrent !== cur) { newState.simCurrent = cur; hasUpdate = true; }
                        }

                        if (c.type === 'BATTERY' || c.type === 'RESISTOR') {
                            // valor editable no canvia per simulació
                        } else {
                            if (newVal !== c.value) { hasUpdate = true; }
                        }

                        if (hasUpdate) {
                            changed = true;
                            return { ...c, state: newState, value: newVal };
                        }
                        return c;
                    });
                    return changed ? newComps : currentComponents;
                });

                // Mapa portKey → voltatge per a tooltips en hover
                const vMap = {};
                comps.forEach(comp => {
                    const ports = COMPONENT_PORTS[comp.type];
                    if (!ports) return;
                    ports.forEach((_, idx) => {
                        const v = ideal.getNodeVoltage(comp.id, idx);
                        vMap[`${comp.id}:${idx}`] = v;
                    });
                });
                setPortVoltageMap(vMap);
            };

            const calculateGhostPoint = (target, last) => {
                const dx = Math.abs(target.x - last.x);
                const dy = Math.abs(target.y - last.y);
                const snappedX = Math.round(target.x / GRID_SIZE) * GRID_SIZE;
                const snappedY = Math.round(target.y / GRID_SIZE) * GRID_SIZE;
                return dx > dy ? { x: snappedX, y: last.y } : { x: last.x, y: snappedY };
            };

            const getGlobalPortPosition = (comp, port) => {
                const angleRad = (comp.rotation * Math.PI) / 180;
                const rotatedX = port.x * Math.cos(angleRad) - port.y * Math.sin(angleRad);
                const rotatedY = port.x * Math.sin(angleRad) + port.y * Math.cos(angleRad);
                return { x: comp.x + comp.width / 2 + rotatedX, y: comp.y + comp.height / 2 + rotatedY };
            };

            const isPointNearSegment = (p, a, b, tolerance) => {
                const minX = Math.min(a.x, b.x) - tolerance;
                const maxX = Math.max(a.x, b.x) + tolerance;
                const minY = Math.min(a.y, b.y) - tolerance;
                const maxY = Math.max(a.y, b.y) + tolerance;
                if (p.x < minX || p.x > maxX || p.y < minY || p.y > maxY) return false;
                const dist = Math.abs((b.y - a.y) * p.x - (b.x - a.x) * p.y + b.x * a.y - b.y * a.x) / Math.sqrt(Math.pow(b.y - a.y, 2) + Math.pow(b.x - a.x, 2));
                return dist < tolerance;
            };

            const splitWireAt = (wireId, segIdx, splitPoint) => {
                const wire = wires.find(w => w.id === wireId);
                if (!wire) return null;

                }
                if (t === 'LED') {
                    if (s.isActive && hasV && hasI) return [`ON \u00B7 ${fv(vd)} \u00B7 ${fi(cur)}`];
                    return [s.isActive ? 'ON' : 'OFF'];
                }
                if (t === 'MOTOR') {
                    if (s.isActive && hasV && hasI) return [`Girant \u00B7 ${fv(vd)} \u00B7 ${fi(cur)}`];
                    return [s.isActive ? 'Girant' : 'Aturat'];
                }
                if (t === 'LOGIC_SOURCE') return [`${s.isOn ? '5V' : '0V'}`];
                if (t === 'LOGIC_PROBE') {
                    if (vd !== undefined) return [`${fv(vd)}`];
                    return [`${s.isActive ? '1' : '0'}`];
                }
                if (['AND','OR','NOT','NAND','NOR','XOR'].includes(t)) return [`Sortida: ${s.logicOut ? '1' : '0'}`];
                if (t === 'VOLTMETER' || t === 'AMMETER' || t === 'SCOPE') return null;
                return null;
            };

            const startPanelDrag = (e) => {
                e.preventDefault(); e.stopPropagation();
                const cr = containerRef.current?.getBoundingClientRect();
                if (!cr) return;
                const curX = panelPos ? panelPos.x : cr.width - 272;
                const curY = panelPos ? panelPos.y : 16;
                panelDragRef.current = { ox: e.clientX - cr.left - curX, oy: e.clientY - cr.top - curY };
                const onMove = (ev) => {
                    const r = containerRef.current?.getBoundingClientRect();
                    if (!r || !panelDragRef.current) return;
                    setPanelPos({ x: Math.max(0, Math.min(r.width - 260, ev.clientX - r.left - panelDragRef.current.ox)), y: Math.max(0, Math.min(r.height - 40, ev.clientY - r.top - panelDragRef.current.oy)) });
                };
                const onUp = () => { panelDragRef.current = null; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            };

            const disconnectedIds = useMemo(() => {
                const ids = new Set();
                components.forEach(comp => {
                    if (['TEXT', 'JUNCTION'].includes(comp.type)) return;
                    const ports = COMPONENT_PORTS[comp.type];
                    if (!ports) return;
                    ports.forEach((_, idx) => {
                        const connected = wires.some(w =>
                            (w.fromComp === comp.id && w.fromPort === idx) ||
                            (w.toComp === comp.id && w.toPort === idx)
                        );
                        if (!connected) ids.add(comp.id);
                    });
                });
                return ids;
            }, [components, wires]);

            const panelComp = showCompPanel ? components.find(c => c.id === showCompPanel) : null;

            return (
                <div className="flex flex-col h-full bg-neutral-900 relative">
                    <div ref={toolbarRef} style={{ zoom: toolbarZoom }} className="bg-neutral-800 border-b border-neutral-700 flex flex-wrap items-center px-3 py-2 justify-between z-10 overflow-visible">
                        <div className="flex items-center gap-2 font-bold text-lg tracking-wider">
                             <Activity className="text-blue-400"/> 
                             <div>
                                <span className="text-blue-400">THOS</span>
                                <span className="text-white">Lab</span>
                                <span className="text-gray-400 text-sm font-normal ml-1">v2.0</span>
                             </div>
                        </div>
                        <div className="flex-1 flex items-center space-x-1 overflow-visible">
                            {/* GRUP ACCIONS ARXIU (SEPARAT) */}
                            <div className="flex items-center space-x-1 bg-neutral-900 p-1 rounded-lg border border-neutral-700 mr-2">
                                <input type="file" ref={fileInputRef} onChange={loadProject} style={{ display: 'none' }} accept=".json" />
                                <ToolButton icon={<FilePlusIcon size={18} />} label="Nou" onClick={newCircuit} />
                                <ToolButton icon={<FolderOpenIcon size={18} />} label="Obrir" onClick={() => fileInputRef.current.click()} />
                                <ToolButton icon={<SaveIcon size={18} />} label="Guardar" onClick={saveProject} />
                                <ToolButton icon={<ImageIcon size={18} />} label="Imatge" onClick={exportImage} />
                                <div className="w-px h-6 bg-neutral-700 mx-1"></div>
                                <ToolButton icon={<UndoIcon size={18} />} label="Desfer" onClick={undo} />
                                <ToolButton icon={<RedoIcon size={18} />} label="Refer" onClick={redo} />
                                <div className="w-px h-6 bg-neutral-700 mx-1"></div>
                                <ToolButton icon={<Maximize2Icon size={18} />} label="Ajustar" onClick={fitView} />
                                <ToolButton icon={<HandIcon size={18} />} label="PAN" onClick={() => { setPanMode(prev => { const next = !prev; if (!next) activateSelectMode(); return next; }); }} />
                            </div>

                            {/* GRUP EINES COMPONENTS */}
                            <div className="flex items-center space-x-1 bg-neutral-900 p-1 rounded-lg border border-neutral-700">
                                <ToolButton icon={<TextIcon size={18} />} label="Text" onClick={() => addComponent('TEXT')} />
                                <div className="w-px h-6 bg-neutral-700 mx-1"></div>
                                <ToolButton icon={<Battery size={18} />} label="Font" onClick={() => addComponent('BATTERY')} />
                                <ToolButton icon={<Zap size={18} />} label="Resist." onClick={() => addComponent('RESISTOR')} />
                                <ToolButton icon={<Lightbulb size={18} />} label="Bombeta" onClick={() => addComponent('LIGHT')} />
                                <ToolButton icon={<LedIcon size={18} />} label="LED" onClick={() => addComponent('LED')} />
                                <ToolButton icon={<Settings size={18} />} label="Motor" onClick={() => addComponent('MOTOR')} />
                                <ToolButton icon={<ToggleLeft size={18} />} label="Switch" onClick={() => addComponent('SWITCH')} />
                                <div className="w-px h-6 bg-neutral-700 mx-1"></div>
                                <ToolButton icon={<Power size={18} />} label="Font 0/1" onClick={() => addComponent('LOGIC_SOURCE')} />
                                <ToolButton icon={<Gauge size={18} />} label="Sonda" onClick={() => addComponent('LOGIC_PROBE')} />
                                <div className="w-px h-6 bg-neutral-700 mx-1"></div>
                                
                                <div className="relative">
                                    <ToolButton icon={<GlobeIcon size={18} />} label={logicSymbolStandard} onClick={toggleLogicStandard} />
                                </div>

                                <div className="relative">
                                    <ToolButton icon={<Cpu size={18} />} label="Lògica" onClick={() => setShowLogicMenu(!showLogicMenu)} />
                                    {showLogicMenu && (
                                        <div className="absolute top-full left-0 mt-1 bg-neutral-800 border border-neutral-600 rounded shadow-xl p-1 grid grid-cols-2 gap-1 z-50 w-32 overflow-visible max-h-none">
                                            {['AND','OR','NOT','NAND','NOR','XOR'].map(t => <button key={t} onClick={() => addComponent(t)} className="logic-menu-btn">{t}</button>)}
                                        </div>
                                    )}
                                </div>
                                <div className="relative">
                                    <ToolButton icon={<Activity size={18} />} label="Instrum." onClick={() => setShowInstrMenu(!showInstrMenu)} />
                                    {showInstrMenu && (
                                        <div className="absolute top-full left-0 mt-1 bg-neutral-800 border border-neutral-600 rounded shadow-xl p-1 flex flex-col gap-1 z-50 w-32 overflow-visible max-h-none">
                                            <button onClick={() => addComponent('VOLTMETER')} className="instr-menu-btn"><Activity size={16}/><span>Voltímetre</span></button>
                                            <button onClick={() => addComponent('AMMETER')} className="instr-menu-btn"><Activity size={16}/><span>Amperímetre</span></button>
                                            <button onClick={() => addComponent('SCOPE')} className="instr-menu-btn"><Activity size={16}/><span>Oscil·los.</span></button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-xs text-green-400 flex items-center gap-1 transition-opacity duration-500" style={{ opacity: autoSaveStatus === 'saved' ? 1 : 0 }}>
                                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                Guardat
                            </span>
                        </div>
                    </div>

                    <div className="flex-1 relative overflow-hidden" ref={containerRef}>
                        <canvas
                            ref={canvasRef}
                            className={`absolute inset-0 block w-full h-full bg-[#1a1a1a] ${panMode ? (isPanning ? 'cursor-grabbing' : 'cursor-grab') : 'cursor-crosshair'}`}
                            onMouseDown={handleMouseDown}
                            onDoubleClick={handleDoubleClick}
                            onMouseMove={handleMouseMove}
                            onMouseUp={handleMouseUp}
                            onWheel={(e) => {
                                e.preventDefault();
                                const canvas = canvasRef.current; if (!canvas) return;
                                const rect = canvas.getBoundingClientRect();
                                const mouseX = e.clientX - rect.left;
                                const mouseY = e.clientY - rect.top;
                                const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
                                const newScale = Math.max(0.1, Math.min(5, view.scale * factor));
                                const newX = mouseX - (mouseX - view.x) * (newScale / view.scale);
                                const newY = mouseY - (mouseY - view.y) * (newScale / view.scale);
                                setView({ x: newX, y: newY, scale: newScale });
                            }}
                        />
                        
                        {(() => {
                            const hComp = hoveredCompId ? components.find(c => c.id === hoveredCompId) : null;
                            const lines = hComp ? getTooltipContent(hComp) : null;
                            if (!lines || !lines.length || isDraggingComp || boxSelectStart || drawingState) return null;
                            const tx = tooltipScreenPos.x + 14;
                            const ty = tooltipScreenPos.y - 10;
                            return (
                                <div style={{ position: 'absolute', left: tx, top: ty, pointerEvents: 'none', zIndex: 300, background: 'rgba(15,15,20,0.92)', border: '1px solid #404040', borderRadius: '6px', padding: '5px 10px', fontSize: '11px', fontFamily: 'monospace', color: '#e2e8f0', whiteSpace: 'nowrap', boxShadow: '0 2px 8px rgba(0,0,0,0.5)' }}>
                                    {lines.map((l, i) => l ? <div key={i} style={{ color: i === 0 ? '#93c5fd' : '#e2e8f0', fontWeight: i === 0 ? 600 : 400 }}>{l}</div> : null)}
                                </div>
                            );
                        })()}

                        {(() => {
                            if (!hoveredPort || drawingState) return null;
                            const comp = components.find(c => c.id === hoveredPort.compId);
                            if (!comp || comp.type !== 'JUNCTION') return null;
                            const v = portVoltageMap[`${hoveredPort.compId}:${hoveredPort.portIndex}`];
                            if (v === undefined) return null;
                            const port = COMPONENT_PORTS[comp.type]?.[hoveredPort.portIndex];
                            if (!port) return null;
                            const worldPos = getGlobalPortPosition(comp, port);
                            const sx = worldPos.x * view.scale + view.x;
                            const sy = worldPos.y * view.scale + view.y;
                            const txt = formatValue(v, 'V');
                            return (
                                <div style={{ position: 'absolute', left: sx + 10, top: sy - 22, pointerEvents: 'none', zIndex: 300, background: 'rgba(15,15,20,0.92)', border: '1px solid #facc15', borderRadius: '6px', padding: '3px 8px', fontSize: '11px', fontFamily: 'monospace', color: '#facc15', whiteSpace: 'nowrap', boxShadow: '0 2px 8px rgba(0,0,0,0.5)' }}>
                                    {txt}
                                </div>
                            );
                        })()}

                        {editingLabel && (
                            <input
                                autoFocus
                                type="text"
                                value={editingLabel.value}
                                onChange={(ev) => setEditingLabel(prev => ({ ...prev, value: ev.target.value }))}
                                onKeyDown={(ev) => {
                                    if (ev.key === 'Enter') { updateComponentProp(editingLabel.id, 'label', editingLabel.value); setEditingLabel(null); }
                                    if (ev.key === 'Escape') setEditingLabel(null);
                                    ev.stopPropagation();
                                }}
                                onBlur={() => { updateComponentProp(editingLabel.id, 'label', editingLabel.value); setEditingLabel(null); }}
                                style={{
                                    position: 'absolute',
                                    left: editingLabel.x - editingLabel.width / 2,
                                    top: editingLabel.y - 10,
                                    width: editingLabel.width,
                                    background: '#1e293b',
                                    border: '1.5px solid #3b82f6',
                                    borderRadius: '4px',
                                    color: 'white',
                                    textAlign: 'center',
                                    fontSize: Math.max(10, 11 * view.scale) + 'px',
                                    fontFamily: 'monospace',
                                    padding: '2px 4px',
                                    outline: 'none',
                                    zIndex: 200,
                                    boxShadow: '0 0 8px #3b82f688',
                                }}
                            />
                        )}

                        {panelComp && (
                            <div className="absolute w-64 bg-neutral-800/90 backdrop-blur border border-neutral-600 p-4 rounded-lg shadow-xl text-xs select-none"
                                style={panelPos ? { left: panelPos.x, top: panelPos.y } : { top: 16, right: 16 }}>
                                <div className="flex justify-between items-center mb-3 cursor-move" onMouseDown={startPanelDrag}>
                                    <span className="font-bold text-white uppercase tracking-wider">{panelComp.type}</span>
                                    <button onClick={() => setShowCompPanel(null)} onMouseDown={e => e.stopPropagation()}><XIcon size={14}/></button>
                                </div>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-gray-400 mb-1">Etiqueta</label>
                                        <input 
                                            type="text" 
                                            value={panelComp.label} 
                                            onChange={(e) => updateComponentProp(panelComp.id, 'label', e.target.value)} 
                                            className="prop-input"
                                        />
                                    </div>
                                    {panelComp.type !== 'SWITCH' && !['AND', 'OR', 'NOT', 'NAND', 'NOR', 'XOR', 'LOGIC_SOURCE', 'LOGIC_PROBE', 'SCOPE', 'VOLTMETER', 'AMMETER', 'TEXT'].includes(panelComp.type) && (
                                        <div>
                                            <label className="block text-gray-400 mb-1">Valor (Ex: 1k, 100, 9V)</label>
                                            <input 
                                                type="text" 
                                                value={editingValues[panelComp.id] ?? panelComp.value} 
                                                onChange={(e) => setEditingValues(prev => ({ ...prev, [panelComp.id]: e.target.value }))} 
                                                onBlur={() => commitValue(panelComp.id)}
                                                onKeyDown={(e) => { if (e.key === 'Enter') { commitValue(panelComp.id); e.currentTarget.blur(); } }}
                                                className="prop-input"
                                            />
                                        </div>
                                    )}
                                    {panelComp.type === 'RESISTOR' && (() => {
                                        const bands = getResistorBands(panelComp.value);
                                        if (!bands) return null;
                                        return (
                                            <div className="mt-1">
                                                <div className="text-gray-400 mb-1">Codi de colors</div>
                                                <div style={{ display:'flex', alignItems:'center', background:'#c8a96e', borderRadius:6, padding:'0 8px', height:28, margin:'0 2px' }}>
                                                    <div style={{ flex:1, height:2, background:'#999' }}/>
                                                    {bands.map((b, i) => (
                                                        <div key={i} style={{ width: i===3 ? 9 : 7, height:28, background:b.hex, marginLeft: i===3 ? 7 : 3, borderRadius:2, flexShrink:0 }}/>
                                                    ))}
                                                    <div style={{ flex:1, height:2, background:'#999' }}/>
                                                </div>
                                                <div style={{ display:'flex', justifyContent:'space-around', marginTop:4 }}>
                                                    {bands.map((b, i) => (
                                                        <div key={i} style={{ textAlign:'center', width:48 }}>
                                                            <div style={{ background:b.hex, color:b.text, borderRadius:3, padding:'1px 2px', fontSize:8, fontWeight:'bold' }}>{b.name}</div>
                                                            <div style={{ color:'#888', fontSize:8, marginTop:1 }}>{b.role}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                    {panelComp.type === 'LOGIC_PROBE' && (
                                        <div className="mt-3">
                                            <label className="block text-gray-400 mb-1 font-bold">Taula de Veritat</label>
                                            <div className="text-xs text-gray-300 mb-2">Entrades detectades:</div>
                                            <div className="max-h-28 overflow-y-auto mb-2">
                                                {components.filter(c => c.type === 'LOGIC_SOURCE').map(src => (
                                                    <div key={src.id} className="flex items-center gap-2">
                                                        <input type="checkbox" checked={selectedInputIdsForTable.includes(src.id)} onChange={(e) => {
                                                            const checked = e.target.checked;
                                                            setSelectedInputIdsForTable(prev => {
                                                                let nxt = prev.slice();
                                                                if (checked) { if (!nxt.includes(src.id) && nxt.length < 4) nxt.push(src.id); }
                                                                else nxt = nxt.filter(id => id !== src.id);
                                                                return nxt;
                                                            });
                                                        }} />
                                                        <span className="text-sm text-gray-200">{src.label || src.id}</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => {
                                                    if (selectedInputIdsForTable.length === 0) { alert('Selecciona almenys 1 entrada'); return; }
                                                    const res = generateTruthTable(panelComp.id, selectedInputIdsForTable);
                                                    if (res.error) alert(res.error);
                                                    else setTruthTable(res);
                                                }} className="bg-blue-600 hover:bg-blue-500 py-1 px-2 rounded text-xs">Generar Taula</button>
                                                {truthTable && (
                                                    <button onClick={() => {
                                                        // export CSV
                                                        const hdr = truthTable.inputs.map(i => i.label).concat(['OUT']);
                                                        const lines = [hdr.join(',')];
                                                        truthTable.rows.forEach(r => {
                                                            lines.push(r.inputs.join(',') + ',' + (r.output ? '1' : '0'));
                                                        });
                                                        const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
                                                        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'truth_table.csv'; a.click();
                                                    }} className="bg-green-600 hover:bg-green-500 py-1 px-2 rounded text-xs">Exportar CSV</button>
                                                )}
                                            </div>
                                            {truthTable && (
                                                <div className="mt-2 text-xs overflow-auto max-h-40">
                                                    <table className="w-full text-[12px] table-auto">
                                                        <thead>
                                                            <tr>
                                                                {truthTable.inputs.map(i => <th key={i.id} className="px-1 text-left">{i.label}</th>)}
                                                                <th className="px-1 text-left">OUT</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {truthTable.rows.map((r, idx) => (
                                                                <tr key={idx} className="odd:bg-neutral-800 even:bg-neutral-900">
                                                                    {r.inputs.map((b, j) => <td key={j} className="px-1">{b}</td>)}
                                                                    <td className="px-1">{r.output ? '1' : '0'}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    <div className="flex gap-2 mt-4 pt-4 border-t border-neutral-700">
                                        <button onClick={rotateSelected} className="flex-1 bg-neutral-700 hover:bg-neutral-600 py-1.5 rounded flex items-center justify-center gap-2"><RotateCw size={14}/> Rotar</button>
                                        <button onClick={() => { deleteSelected(); setShowCompPanel(null); }} className="flex-1 bg-red-900/50 hover:bg-red-900/80 text-red-200 py-1.5 rounded flex items-center justify-center gap-2"><Trash2 size={14}/> Eliminar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        
                    </div>
                </div>
            );
        }

        function ToolButton({ icon, label, onClick }) {
            return (
                <button onClick={onClick} className="flex flex-col items-center justify-center w-12 sm:w-16 py-1 hover:bg-neutral-700 rounded transition-all active:scale-95 group">
                    <div className="text-neutral-300 group-hover:text-white mb-0.5">{icon}</div>
                    <span className="text-[10px] text-neutral-400 group-hover:text-neutral-200">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
